<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#0b0b0b;
    touch-action:none;
}
canvas{ display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

/* =========================
   RESPONSIVE CANVAS
========================= */

function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);

    updateGridSize();
}
window.addEventListener("resize",resizeCanvas);

/* =========================
   UI SCALE
========================= */

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

let gridSize;
let jackRadiusOuter;
let jackRadiusInner;

function updateGridSize(){

    if(isMobile){
        // minimal 8 x 14 lubang
        const sizeByWidth  = window.innerWidth / 14;
        const sizeByHeight = window.innerHeight / 8;
        gridSize = Math.min(sizeByWidth, sizeByHeight);
    }else{
        gridSize = 30;
    }

    jackRadiusOuter = gridSize * 0.2;
    jackRadiusInner = gridSize * 0.07;
}

/* =========================
   COLOR GENERATOR
========================= */

function randomCableColor(){
    const hue = Math.floor(Math.random() * 360);
    return `hsl(${hue}, 90%, 55%)`;
}

/* =========================
   DATA
========================= */

let cables = [];
let dragging = null;

/* =========================
   MAGNETIC GRID
========================= */

function getNearestGridJack(x,y){

    const gx = Math.round(x / gridSize);
    const gy = Math.round(y / gridSize);

    const snapX = gx * gridSize;
    const snapY = gy * gridSize;

    const dx = snapX - x;
    const dy = snapY - y;
    const dist = dx*dx + dy*dy;

    const snapDistance = gridSize * 0.35;

    if(dist < snapDistance * snapDistance){
        return {x:snapX,y:snapY};
    }
    return null;
}

/* =========================
   AUDIO ENGINE (TECHNO LIGHT)
========================= */

let audioCtx = null;
let osc, filter, master, lfo, lfoGain;

function initAudio(){
    if(audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)({
        latencyHint:"interactive"
    });

    master = audioCtx.createGain();
    master.gain.value = 0.35;
    master.connect(audioCtx.destination);

    osc = audioCtx.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.value = 120;

    filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 800;
    filter.Q.value = 7;

    lfo = audioCtx.createOscillator();
    lfo.type = "triangle";
    lfo.frequency.value = 0.6;

    lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 600;

    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    osc.connect(filter);
    filter.connect(master);

    osc.start();
    lfo.start();
}

function unlockAudio(){
    if(!audioCtx) initAudio();
    if(audioCtx.state === "suspended"){
        audioCtx.resume();
    }
}

document.addEventListener("pointerdown",unlockAudio);

/* =========================
   POINTER EVENTS
========================= */

canvas.addEventListener("pointerdown", e=>{
    unlockAudio();
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const jack = getNearestGridJack(x,y);
    if(jack){
        dragging = {
            start:jack,
            end:{x,y},
            color:randomCableColor()
        };
        cables.push(dragging);
    }
});

canvas.addEventListener("pointermove", e=>{
    if(!dragging) return;
    const rect = canvas.getBoundingClientRect();
    dragging.end.x = e.clientX - rect.left;
    dragging.end.y = e.clientY - rect.top;
});

canvas.addEventListener("pointerup", e=>{
    if(!dragging) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const jack = getNearestGridJack(x,y);

    if(jack){
        dragging.end = jack;

        osc.frequency.setTargetAtTime(
            80 + Math.random()*250,
            audioCtx.currentTime,
            0.03
        );

        filter.frequency.setTargetAtTime(
            400 + Math.random()*1200,
            audioCtx.currentTime,
            0.05
        );

    }else{
        cables.pop();
    }

    dragging = null;
});

/* =========================
   DRAW LOOP
========================= */

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const cols = Math.floor(window.innerWidth / gridSize);
    const rows = Math.floor(window.innerHeight / gridSize);

    // draw jacks
    for(let y=1;y<rows-1;y++){
        for(let x=1;x<cols-1;x++){
            const px = x * gridSize;
            const py = y * gridSize;

            ctx.beginPath();
            ctx.arc(px,py,jackRadiusOuter,0,Math.PI*2);
            ctx.fillStyle="#444";
            ctx.fill();

            ctx.beginPath();
            ctx.arc(px,py,jackRadiusInner,0,Math.PI*2);
            ctx.fillStyle="#111";
            ctx.fill();
        }
    }

    // cables (CURVE)
    for(let c of cables){

        ctx.beginPath();
        ctx.lineWidth = gridSize * 0.12;
        ctx.lineCap = "round";
        ctx.strokeStyle = c.color;

        const dx = (c.end.x - c.start.x) * 0.5;

        ctx.moveTo(c.start.x,c.start.y);
        ctx.bezierCurveTo(
            c.start.x + dx, c.start.y + 80,
            c.end.x - dx,   c.end.y - 80,
            c.end.x,        c.end.y
        );

        ctx.stroke();
    }

    requestAnimationFrame(draw);
}

resizeCanvas();
draw();
</script>
</body>
</html>
