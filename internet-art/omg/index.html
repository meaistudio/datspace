<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#0b0b0b;
    touch-action:none;
}
canvas{ display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

/* =========================
   RESPONSIVE CANVAS
========================= */

function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

/* =========================
   UI SCALE (3X HP)
========================= */

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const scaleUI = isMobile ? 3 : 1;

const gridSize = 30 * scaleUI;
const jackRadiusOuter = 6 * scaleUI;
const jackRadiusInner = 2 * scaleUI;

let cables = [];
let dragging = null;

/* =========================
   MAGNETIC GRID (OPTIMIZED)
========================= */

function getNearestGridJack(x,y){
    const gx = Math.round(x / gridSize);
    const gy = Math.round(y / gridSize);

    const snapDistance = gridSize * 0.35; // stabil & presisi

    const snapX = gx * gridSize;
    const snapY = gy * gridSize;

    const dx = snapX - x;
    const dy = snapY - y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < snapDistance){
        return {x:snapX,y:snapY};
    }
    return null;
}

/* =========================
   AUDIO ENGINE (LIGHT)
========================= */

let audioCtx = null;
let osc;
let lfo;
let master;

function initAudio(){
    if(audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)({
        latencyHint:"interactive"
    });

    master = audioCtx.createGain();
    master.gain.value = 0.3;
    master.connect(audioCtx.destination);

    osc = audioCtx.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.value = 110;

    // random LFO (sample & hold style)
    lfo = audioCtx.createOscillator();
    lfo.type = "square";
    lfo.frequency.value = 2;

    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 25;

    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    osc.connect(master);

    osc.start();
    lfo.start();
}

function unlockAudio(){
    if(!audioCtx) initAudio();
    if(audioCtx.state === "suspended"){
        audioCtx.resume();
    }
}

document.addEventListener("pointerdown",unlockAudio);

/* =========================
   POINTER EVENTS
========================= */

canvas.addEventListener("pointerdown", e=>{
    unlockAudio();
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const jack = getNearestGridJack(x,y);
    if(jack){
        dragging = {start:jack,end:{x,y}};
        cables.push(dragging);
    }
});

canvas.addEventListener("pointermove", e=>{
    if(!dragging) return;
    const rect = canvas.getBoundingClientRect();
    dragging.end.x = e.clientX - rect.left;
    dragging.end.y = e.clientY - rect.top;
});

canvas.addEventListener("pointerup", e=>{
    if(!dragging) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const jack = getNearestGridJack(x,y);

    if(jack){
        dragging.end = jack;

        // modular pitch reaction (lightweight)
        osc.frequency.setTargetAtTime(
            60 + Math.random()*300,
            audioCtx.currentTime,
            0.03
        );
    }else{
        cables.pop();
    }

    dragging = null;
});

/* =========================
   DRAW LOOP (LIGHT)
========================= */

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const cols = Math.floor(window.innerWidth / gridSize);
    const rows = Math.floor(window.innerHeight / gridSize);

    // draw grid jacks
    for(let y=1;y<rows-1;y++){
        for(let x=1;x<cols-1;x++){
            const px = x * gridSize;
            const py = y * gridSize;

            ctx.beginPath();
            ctx.arc(px,py,jackRadiusOuter,0,Math.PI*2);
            ctx.fillStyle="#444";
            ctx.fill();

            ctx.beginPath();
            ctx.arc(px,py,jackRadiusInner,0,Math.PI*2);
            ctx.fillStyle="#111";
            ctx.fill();
        }
    }

    // cables
    ctx.strokeStyle="#00ff88";
    ctx.lineWidth=2*scaleUI;

    for(let c of cables){
        ctx.beginPath();
        ctx.moveTo(c.start.x,c.start.y);
        ctx.lineTo(c.end.x,c.end.y);
        ctx.stroke();
    }

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
