<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>OMG-Own-Modular-Generating</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#e9e9e9;
    overflow:hidden;
    font-family:Helvetica, Arial, sans-serif;
}
canvas{
    display:block;
    touch-action:manipulation;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let gridSize = 30;
let jackRadiusOuter = 6;
let jackRadiusInner = 2;
let cableThickness = 8;

let snapDistance = 40; // lebih magnetik
let jacks = [];
let cables = [];
let draggingCableEnd = null;

// ================= RESIZE =================

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    createGrid();
}
window.addEventListener("resize", resizeCanvas);

// ================= GRID =================

function createGrid(){
    jacks = [];

    const cols = Math.floor(canvas.width / gridSize);
    const rows = Math.floor(canvas.height / gridSize);

    for(let y=1;y<rows-1;y++){
        for(let x=1;x<cols-1;x++){
            jacks.push({
                x: x * gridSize,
                y: y * gridSize
            });
        }
    }
}

// ================= AUDIO (MOBILE SAFE) =================

let audioCtx;
let masterGain;
let cableVoices = new Map();
let audioUnlocked = false;
const MAX_VOICES = 6; // lebih aman untuk mobile

function initAudio(){
    if(audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)({
        latencyHint: "interactive"
    });

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
}

async function unlockAudio(){
    if(audioUnlocked) return;

    initAudio();

    if(audioCtx.state === "suspended"){
        await audioCtx.resume();
    }

    audioUnlocked = true;
}

function createCableSound(cable){

    if(cableVoices.size >= MAX_VOICES) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = "sine";

    filter.type = "lowpass";
    filter.frequency.value = 800;

    gain.gain.value = 0;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);

    osc.start();

    // smooth fade in
    gain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.08);

    cableVoices.set(cable,{osc,gain,filter});
}

function updateCableAudioParams(cable){

    const voice = cableVoices.get(cable);
    if(!voice) return;

    const {osc,gain,filter} = voice;

    const length = Math.hypot(
        cable.to.x - cable.from.x,
        cable.to.y - cable.from.y
    );

    const targetFreq = 90 + length * 1.2;

    // smoothing supaya tidak glitch
    osc.frequency.setTargetAtTime(
        targetFreq,
        audioCtx.currentTime,
        0.06
    );

    gain.gain.setTargetAtTime(
        Math.min(0.18, 0.05 + length/1500),
        audioCtx.currentTime,
        0.08
    );

    filter.frequency.setTargetAtTime(
        600 + length,
        audioCtx.currentTime,
        0.08
    );
}

function removeCableSound(cable){
    const voice = cableVoices.get(cable);
    if(!voice) return;

    const {osc,gain} = voice;

    gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);

    setTimeout(()=>{
        try{osc.stop();}catch(e){}
        try{osc.disconnect();}catch(e){}
        try{gain.disconnect();}catch(e){}
    },300);

    cableVoices.delete(cable);
}

// ================= DRAW =================

function drawJack(j){
    ctx.beginPath();
    ctx.fillStyle="#fff";
    ctx.arc(j.x,j.y,jackRadiusOuter,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle="#000";
    ctx.lineWidth=1.5;
    ctx.arc(j.x,j.y,jackRadiusOuter,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.fillStyle="#000";
    ctx.arc(j.x,j.y,jackRadiusInner,0,Math.PI*2);
    ctx.fill();
}

function drawCable(c){
    ctx.beginPath();
    ctx.lineWidth = cableThickness;
    ctx.lineCap="round";
    ctx.strokeStyle=c.color;

    const dx=(c.to.x-c.from.x)*0.5;

    ctx.moveTo(c.from.x,c.from.y);
    ctx.bezierCurveTo(
        c.from.x+dx,c.from.y+100,
        c.to.x-dx,c.to.y-100,
        c.to.x,c.to.y
    );
    ctx.stroke();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    jacks.forEach(drawJack);
    cables.forEach(drawCable);
    requestAnimationFrame(draw);
}

// ================= INTERACTION =================

function getPos(e){
    let x,y;
    if(e.touches){
        x=e.touches[0].clientX;
        y=e.touches[0].clientY;
    } else {
        x=e.clientX;
        y=e.clientY;
    }
    return {x,y};
}

function getNearestJack(x,y){
    let closest=null;
    let minDist=Infinity;

    for(let j of jacks){
        const d=Math.hypot(j.x-x,j.y-y);
        if(d<snapDistance && d<minDist){
            minDist=d;
            closest=j;
        }
    }
    return closest;
}

function randomColor(){
    const colors=["#ff3b30","#ff9500","#ffcc00","#007aff","#8e8e93"];
    return colors[Math.floor(Math.random()*colors.length)];
}

async function pointerDown(e){

    await unlockAudio();

    const {x:mx,y:my}=getPos(e);

    const j=getNearestJack(mx,my);
    if(j){
        const newCable={
            from:{x:j.x,y:j.y},
            to:{x:mx,y:my},
            color:randomColor()
        };
        cables.push(newCable);
        createCableSound(newCable);
        draggingCableEnd={cable:newCable,end:"to"};
    }
}

function pointerMove(e){
    if(!draggingCableEnd) return;
    const {x:mx,y:my}=getPos(e);
    draggingCableEnd.cable.to.x=mx;
    draggingCableEnd.cable.to.y=my;
    updateCableAudioParams(draggingCableEnd.cable);
}

function pointerUp(e){
    if(!draggingCableEnd) return;
    const {x:mx,y:my}=getPos(e);
    const j=getNearestJack(mx,my);
    if(j){
        draggingCableEnd.cable.to.x=j.x;
        draggingCableEnd.cable.to.y=j.y;
    }
    updateCableAudioParams(draggingCableEnd.cable);
    draggingCableEnd=null;
}

canvas.addEventListener("mousedown",pointerDown);
canvas.addEventListener("mousemove",pointerMove);
canvas.addEventListener("mouseup",pointerUp);

canvas.addEventListener("touchstart",pointerDown);
canvas.addEventListener("touchmove",pointerMove);
canvas.addEventListener("touchend",pointerUp);

resizeCanvas();
draw();
</script>

</body>
</html>
