<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEMOTIVATED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    padding:0;
    background:#f0f0f0;
    overflow:hidden;
    font-family:monospace;
}

/* TITLE */
#title{
    position:absolute;
    top:2%;
    width:100%;
    text-align:center;
    font-size:4vmin;
    letter-spacing:0.4vmin;
}

/* CONTAINER */
#container{
    position:relative;
    width:100vw;
    height:100vh;
}

/* SLOT (FRAME KOSONG) */
.slot{
    position:absolute;
    box-sizing:border-box;
    border:3px dashed black;
    background:transparent;
}

/* BLACK PIECE */
.piece{
    position:absolute;
    background:black;
    cursor:grab;
}

/* MOCKING TEXT */
#mock{
    position:absolute;
    top:10%;
    width:100%;
    text-align:center;
    font-size:3vmin;
    opacity:0;
    transition:opacity 0.3s ease;
}

/* INSTRUCTION */
#instruction{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    font-size:3.2vmin;
    width:80%;
    max-width:600px;
    line-height:1.6;
    transition:opacity 0.6s ease;
}
</style>
</head>
<body>

<h1 id="title">DEMOTIVATED</h1>

<div id="container"></div>
<div id="mock"></div>

<div id="instruction">
    Drag the black square into the empty frame.
</div>

<script>
const container = document.getElementById("container");
const mock = document.getElementById("mock");
const instruction = document.getElementById("instruction");

const insults = [
    "Nice try.",
    "Almost. Not really.",
    "You thought so?",
    "Keep dreaming.",
    "Too slow.",
    "Predictable.",
    "That was cute.",
    "Still no.",
    "Try harder.",
    "You can't win."
];

let slotX, slotY;
let dragging=false, offsetX, offsetY;
let started=false;

const slot = document.createElement("div");
slot.className="slot";
container.appendChild(slot);

const piece = document.createElement("div");
piece.className="piece";
container.appendChild(piece);

function clamp(value, min, max){
    return Math.max(min, Math.min(max, value));
}

function updateSlotPosition(){
    slot.style.left = slotX + "px";
    slot.style.top = slotY + "px";
}

function teleport(size){
    slotX = Math.random() * (window.innerWidth - size);
    slotY = Math.random() * (window.innerHeight - size);
    updateSlotPosition();

    mock.textContent = insults[Math.floor(Math.random()*insults.length)];
    mock.style.opacity = 1;
    setTimeout(()=> mock.style.opacity = 0, 1200);
}

function avoid(size){
    const pieceRect = piece.getBoundingClientRect();

    const dx = slotX - pieceRect.left;
    const dy = slotY - pieceRect.top;
    const dist = Math.sqrt(dx*dx + dy*dy);

    const AVOID_RADIUS = size * 2;
    const SPEED = size * 0.07;

    if(dist < AVOID_RADIUS){

        const angle = Math.atan2(dy, dx);

        slotX += Math.cos(angle) * SPEED;
        slotY += Math.sin(angle) * SPEED;

        const clampedX = clamp(slotX, 0, window.innerWidth - size);
        const clampedY = clamp(slotY, 0, window.innerHeight - size);

        const hitWall = (clampedX !== slotX) || (clampedY !== slotY);

        slotX = clampedX;
        slotY = clampedY;

        updateSlotPosition();

        if(hitWall){
            teleport(size);
        }
    }
}

function init(){
    const size = Math.min(window.innerWidth, window.innerHeight) * 0.22;

    slot.style.width = size + "px";
    slot.style.height = size + "px";

    piece.style.width = size + "px";
    piece.style.height = size + "px";

    slotX = window.innerWidth * 0.55;
    slotY = window.innerHeight * 0.45;

    piece.style.left = "10vw";
    piece.style.top = "10vh";

    updateSlotPosition();
}

function startInteraction(){
    if(!started){
        instruction.style.opacity = 0;
        started = true;
    }
}

/* MOUSE */
piece.addEventListener("mousedown", e=>{
    dragging=true;
    offsetX=e.offsetX;
    offsetY=e.offsetY;
    startInteraction();
});

document.addEventListener("mouseup", ()=>dragging=false);

document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    const size = piece.offsetWidth;
    piece.style.left=(e.clientX-offsetX)+"px";
    piece.style.top=(e.clientY-offsetY)+"px";
    avoid(size);
});

/* TOUCH */
piece.addEventListener("touchstart", e=>{
    dragging=true;
    const touch=e.touches[0];
    const rect=piece.getBoundingClientRect();
    offsetX=touch.clientX-rect.left;
    offsetY=touch.clientY-rect.top;
    startInteraction();
});

document.addEventListener("touchend", ()=>dragging=false);

document.addEventListener("touchmove", e=>{
    if(!dragging) return;
    const touch=e.touches[0];
    const size = piece.offsetWidth;
    piece.style.left=(touch.clientX-offsetX)+"px";
    piece.style.top=(touch.clientY-offsetY)+"px";
    avoid(size);
});

window.addEventListener("resize", init);

init();
</script>

</body>
</html>
