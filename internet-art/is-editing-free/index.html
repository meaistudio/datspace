<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IS EDITING FREE?</title>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.container{
position:relative;
cursor:pointer;
}

img{
width:900px;
}

/* TEXT TAP */

.tap{
position:absolute;
top:200px;
left:50%;
transform:translateX(-50%);
color:black;
font-size:60px;
font-weight:bold;
text-align:center;
line-height:1.2;
animation:pulse 1s infinite;
}

.tap span{
font-size:40px;
font-weight:normal;
display:block;
margin-top:0.5  px;
}

@keyframes pulse{

0%{opacity:0.3; transform:translateX(-50%) scale(1);}
50%{opacity:1; transform:translateX(-50%) scale(1.2);}
100%{opacity:0.3; transform:translateX(-50%) scale(1);}

}

</style>

</head>

<body>

<div class="container" id="clickArea">

<div class="tap">
TAP<br>
<span>for free editing</span>
</div>

<img id="image" src="laptop1.png">

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

let step = 1
let maxStep = 9

let img = document.getElementById("image")
let sound = document.getElementById("clickSound")
let area = document.getElementById("clickArea")

area.onclick = function(){

sound.currentTime = 0
sound.play()

img.src = "laptop" + step + "_click.png"

setTimeout(function(){

if(step < maxStep){
step++
}

img.src = "laptop" + step + ".png"

},90)

}

</script>

</body>
</html>
