<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>FUNTIME LOCKED</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

/* CANVAS */
.scene {
    position:absolute;
    width:1080px;
    height:1080px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* BACKGROUND */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    pointer-events:none;
}

/* ASTEROID */
.asteroid {
    position:absolute;
    width:100%;
    top:350px;
    z-index:1;
    pointer-events:none;
}

/* EARTH */
.earth {
    position:absolute;
    width:220px;
    top:180px;
    left:340px;
    z-index:3;
}

/* BALLS */
.ball1 { position:absolute; width:120px; top:180px; left:600px; z-index:4; }
.ball2 { position:absolute; width:100px; top:450px; left:380px; z-index:4; }
.ball3 { position:absolute; width:90px;  top:630px; left:450px; z-index:4; }
.ball4 { position:absolute; width:160px; top:730px; left:350px; z-index:4; }

/* GIRL */
.girl {
    position:absolute;
    width:420px;
    bottom:160px;
    left:55%;
    transform:translateX(-50%);
    z-index:5;
    pointer-events:none;
}

/* IMAGE */
img {
    display:block;
}

/* CLICKABLE */
.clickable {
    cursor:pointer;
    transition: transform 0.2s ease, filter 0.2s ease;
}

/* ACTIVE */
.active {
    transform: scale(1.2);
    filter: brightness(1.2);
}
</style>
</head>

<body>

<div class="scene">

    <!-- BG -->
    <img class="bg" src="gif/galaxy.gif">

    <!-- ASTEROID -->
    <img class="asteroid" src="gif/asteroid.gif">

    <!-- EARTH -->
    <img class="earth clickable" src="gif/earth.gif">

    <!-- BALLS -->
    <img class="ball1 clickable" src="gif/ball-1.gif">
    <img class="ball2 clickable" src="gif/ball-2.gif">
    <img class="ball3 clickable" src="gif/ball-3.gif">
    <img class="ball4 clickable" src="gif/ball-4.gif">

    <!-- GIRL -->
    <img class="girl" src="gif/anime-girl.gif">

</div>

<!-- AUDIO -->
<audio id="audio-ball2" src="song/my-song-44.mp3"></audio>

<script>
const items = document.querySelectorAll('.clickable');
const audioBall2 = document.getElementById('audio-ball2');

items.forEach(el => {
    el.addEventListener('click', () => {

        const isActive = el.classList.contains('active');

        // reset visual
        items.forEach(i => i.classList.remove('active'));

        // stop audio
        audioBall2.pause();
        audioBall2.currentTime = 0;

        // aktifkan jika belum aktif
        if (!isActive) {
            el.classList.add('active');

            // khusus ball2 play audio
            if (el.classList.contains('ball2')) {
                audioBall2.play();
            }
        }
    });
});
</script>

</body>
</html>
