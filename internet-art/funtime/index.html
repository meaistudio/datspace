<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FUNTIME LOCKED</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

/* SCENE */
.scene {
    position:absolute;
    width:1080px;
    height:1080px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* BG */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* ASTEROID */
.asteroid {
    position:absolute;
    width:100%;
    top:350px;
    z-index:1;
    pointer-events:none;
    transition: transform 0.5s ease;
}

/* BALLS */
.ball1, .ball2, .ball3, .ball4 {
    position:absolute;
    z-index:4;
    cursor:pointer;
}

.ball1 { width:120px; top:180px; left:600px; }
.ball2 { width:100px; top:450px; left:380px; }
.ball3 { width:90px;  top:630px; left:450px; }
.ball4 { width:160px; top:730px; left:350px; }

/* GIRL FLOAT */
@keyframes floatGirl {
    0%   { transform: translateX(-50%) translateY(0px); }
    50%  { transform: translateX(-50%) translateY(-10px); }
    100% { transform: translateX(-50%) translateY(0px); }
}

.girl {
    position:absolute;
    width:420px;
    bottom:160px;
    left:55%;
    transform:translateX(-50%);
    z-index:5;

    pointer-events:none; /* 🔥 penting */
    animation: floatGirl 5s ease-in-out infinite;
}

/* HITBOX (AREA INTERAKSI TENGAH BADAN) */
.girl-hitbox {
    position:absolute;
    width:160px;
    height:180px;
    bottom:200px;
    left:55%;
    transform:translateX(-50%);
    z-index:6;

    cursor:pointer;
    /* debug: kasih warna kalau mau lihat */
    /* background: rgba(255,0,0,0.2); */
}

/* ACTIVE */
.active {
    transform: scale(1.2);
    filter: brightness(1.2);
}

/* ORBIT */
.orbit {
    position:absolute;
    width:200px;
    height:200px;
    display:none;
    pointer-events:none;
    z-index:3;
    animation: spin 25s linear infinite;
}

.orbit svg {
    width:100%;
    height:100%;
    overflow:visible;
}

.orbit text {
    font-family:"Times New Roman", serif;
    font-size:16px;
    fill:white;
    letter-spacing:2px;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* FOOTER */
.footer-text {
    position:fixed;
    bottom:20px;
    left:20px;
    color:white;
    font-family: monospace;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="scene">

    <img class="bg" src="gif/galaxy.gif">
    <img id="asteroid" class="asteroid" src="gif/asteroid.gif">

    <!-- BALLS -->
    <img class="ball1" src="gif/ball-1.gif">
    <img class="ball2" src="gif/ball-2.gif">
    <img class="ball3" src="gif/ball-3.gif">
    <img class="ball4" src="gif/ball-4.gif">

    <!-- ORBIT -->
    <div id="orbit1" class="orbit"></div>
    <div id="orbit2" class="orbit"></div>
    <div id="orbit3" class="orbit"></div>
    <div id="orbit4" class="orbit"></div>

    <!-- GIRL -->
    <img id="animeGirl" class="girl" src="gif/anime-girl.gif">

    <!-- HITBOX -->
    <div id="girlHitbox" class="girl-hitbox"></div>

</div>

<div class="footer-text">DATs X FUNTIME</div>

<script>
const girl = document.getElementById('animeGirl');
const hitbox = document.getElementById('girlHitbox');

/* HOLD SYSTEM (HANYA HITBOX) */
let holding = false;

hitbox.addEventListener('mousedown', () => {
    holding = true;
    girl.src = "gif/anime-girl-angry.gif";
});

window.addEventListener('mouseup', () => {
    if (holding) {
        girl.src = "gif/anime-girl.gif";
        holding = false;
    }
});

/* MOBILE */
hitbox.addEventListener('touchstart', () => {
    holding = true;
    girl.src = "gif/anime-girl-angry.gif";
});

window.addEventListener('touchend', () => {
    if (holding) {
        girl.src = "gif/anime-girl.gif";
        holding = false;
    }
});
</script>

</body>
</html>
