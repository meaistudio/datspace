<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>FUNTIME LOCKED</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

/* CANVAS */
.scene {
    position:absolute;
    width:1080px;
    height:1080px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* BACKGROUND */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    pointer-events:none;
}

/* ASTEROID */
.asteroid {
    position:absolute;
    width:100%;
    top:350px;
    z-index:1;
    pointer-events:none;
    transition: transform 0.5s ease;
}

/* EARTH */
.earth {
    position:absolute;
    width:220px;
    top:180px;
    left:340px;
    z-index:3;
}

/* BALLS */
.ball1 { position:absolute; width:120px; top:180px; left:600px; z-index:4; }
.ball2 { position:absolute; width:100px; top:450px; left:380px; z-index:4; }
.ball3 { position:absolute; width:90px;  top:630px; left:450px; z-index:4; }
.ball4 { position:absolute; width:160px; top:730px; left:350px; z-index:4; }

/* GIRL */
.girl {
    position:absolute;
    width:420px;
    bottom:160px;
    left:55%;
    transform:translateX(-50%);
    z-index:5;
}

/* CLICKABLE */
.clickable {
    cursor:pointer;
    transition: transform 0.2s ease, filter 0.2s ease;
}

.active {
    transform: scale(1.2);
    filter: brightness(1.2);
}

/* ORBIT */
.orbit {
    position:absolute;
    width:200px;
    height:200px;
    display:none;
    pointer-events:none;
    z-index:3;
    animation: spin 25s linear infinite;
}

.orbit svg {
    width:100%;
    height:100%;
    overflow:visible;
}

.orbit text {
    font-family:"Times New Roman", serif;
    font-size:16px;
    fill:white;
    letter-spacing:2px;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* FOOTER */
.footer-text {
    position:fixed;
    bottom:20px;
    left:20px;
    color:white;
    font-family: monospace;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="scene">

    <img class="bg" src="gif/galaxy.gif">
    <img id="asteroid" class="asteroid" src="gif/asteroid.gif">

    <img class="earth clickable" src="gif/earth.gif">

    <img class="ball1 clickable" src="gif/ball-1.gif">
    <img class="ball2 clickable" src="gif/ball-2.gif">
    <img class="ball3 clickable" src="gif/ball-3.gif">
    <img class="ball4 clickable" src="gif/ball-4.gif">

    <!-- ORBIT -->
    <div id="orbit1" class="orbit"></div>
    <div id="orbit2" class="orbit"></div>
    <div id="orbit3" class="orbit"></div>
    <div id="orbit4" class="orbit"></div>

    <img class="girl" src="gif/anime-girl.gif">

</div>

<div class="footer-text">DATs X FUNTIME</div>

<!-- AUDIO MULTI -->
<audio id="audio-ball1" src="song/velfarre-2002.mp3" preload="auto"></audio>
<audio id="audio-ball2" src="song/xenon-1996.mp3" preload="auto"></audio>
<audio id="audio-ball3" src="song/twin-star-1999.mp3" preload="auto"></audio>
<audio id="audio-ball4" src="song/9loveJ-2001-(Ft.Gestalt-Intelligence).mp3" preload="auto"></audio>

<script>
const items = document.querySelectorAll('.clickable');
const asteroid = document.getElementById('asteroid');

/* AUDIO MAP */
const audios = {
    ball1: document.getElementById('audio-ball1'),
    ball2: document.getElementById('audio-ball2'),
    ball3: document.getElementById('audio-ball3'),
    ball4: document.getElementById('audio-ball4')
};

/* ORBIT CONFIG (RADIUS PER BOLA) */
const orbits = {
    ball1: { el: orbit1, text: "Velfarre 2002", radius: 70 },
    ball2: { el: orbit2, text: "Xenon 1996", radius: 55 }, // lebih kecil
    ball3: { el: orbit3, text: "Twin Star 1999", radius: 70 },
    ball4: { el: orbit4, text: "9LoveJ 2001", radius: 70 }
};

function createSVGOrbit(container, text, radius) {
    container.innerHTML = "";

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 200 200");

    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    const id = "circlePath" + Math.random();

    path.setAttribute("id", id);
    path.setAttribute("d",
        `M 100,100
         m -${radius},0
         a ${radius},${radius} 0 1,1 ${radius*2},0
         a ${radius},${radius} 0 1,1 -${radius*2},0`
    );

    defs.appendChild(path);
    svg.appendChild(defs);

    const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    const textPath = document.createElementNS("http://www.w3.org/2000/svg", "textPath");

    textPath.setAttributeNS("http://www.w3.org/1999/xlink", "href", "#" + id);
    textPath.setAttribute("startOffset", "50%");
    textPath.setAttribute("text-anchor", "middle");

    textPath.textContent = text + " • " + text;

    textEl.appendChild(textPath);
    svg.appendChild(textEl);

    container.appendChild(svg);
}

function positionOrbit(orbitEl, targetEl) {
    const rect = targetEl.getBoundingClientRect();
    const parentRect = document.querySelector('.scene').getBoundingClientRect();

    orbitEl.style.left = (rect.left - parentRect.left + rect.width/2 - 100) + "px";
    orbitEl.style.top = (rect.top - parentRect.top + rect.height/2 - 100) + "px";
}

items.forEach(el => {
    el.addEventListener('click', () => {

        const isActive = el.classList.contains('active');

        items.forEach(i => i.classList.remove('active'));
        Object.values(orbits).forEach(o => o.el.style.display = "none");

        // STOP ALL AUDIO
        Object.values(audios).forEach(a => {
            a.pause();
            a.currentTime = 0;
        });

        asteroid.style.transform = "translateY(0px)";

        if (!isActive) {
            el.classList.add('active');

            const key = [...el.classList].find(c => c.startsWith('ball'));

            const orbit = orbits[key];
            if (orbit) {
                createSVGOrbit(orbit.el, orbit.text, orbit.radius);
                positionOrbit(orbit.el, el);
                orbit.el.style.display = "block";
            }

            const audio = audios[key];
            if (audio) {
                audio.play().catch(err => console.log(err));
            }

            if (key === "ball1") asteroid.style.transform = "translateY(20px)";
            if (key === "ball2") asteroid.style.transform = "translateY(60px)";
            if (key === "ball3") asteroid.style.transform = "translateY(100px)";
            if (key === "ball4") asteroid.style.transform = "translateY(150px)";
        }
    });
});
</script>

</body>
</html>
