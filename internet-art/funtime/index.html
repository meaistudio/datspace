<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FUNTIME LOCKED</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

/* SCENE */
.scene {
    position:absolute;
    width:1080px;
    height:1080px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* BG */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ASTEROID */
.asteroid {
    position:absolute;
    width:100%;
    top:350px;
    z-index:1;
    transition: transform 0.5s ease;
}

/* BALLS */
.ball1, .ball2, .ball3, .ball4 {
    position:absolute;
    z-index:5;
    cursor:pointer;
    animation: breathe 4s ease-in-out infinite;
}

.ball1 { width:120px; top:180px; left:600px; }
.ball2 { width:100px; top:450px; left:380px; }
.ball3 { width:90px;  top:630px; left:450px; }
.ball4 { width:160px; top:730px; left:350px; }

/* idle animation */
@keyframes breathe {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* ACTIVE CLICK */
.active {
    animation: none; /* stop idle */
    transform: scale(1.25);
}

/* GIRL */
.girl {
    position:absolute;
    width:420px;
    bottom:160px;
    left:55%;
    transform:translateX(-50%);
    z-index:4;
}

/* ORBIT */
.orbit {
    position:absolute;
    width:200px;
    height:200px;
    display:none;
    pointer-events:none;
    z-index:3;
    animation: spin 25s linear infinite;
}

.orbit svg {
    width:100%;
    height:100%;
    overflow:visible;
}

.orbit text {
    font-family:"Times New Roman", serif;
    font-size:16px;
    fill:white;
    letter-spacing:2px;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* FOOTER */
.footer-text {
    position:fixed;
    bottom:20px;
    left:20px;
    color:white;
    font-family: monospace;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="scene">

    <img class="bg" src="gif/galaxy.gif">
    <img id="asteroid" class="asteroid" src="gif/asteroid.gif">

    <!-- BALLS -->
    <img class="ball1" src="gif/ball-1.gif">
    <img class="ball2" src="gif/ball-2.gif">
    <img class="ball3" src="gif/ball-3.gif">
    <img class="ball4" src="gif/ball-4.gif">

    <!-- ORBIT -->
    <div id="orbit1" class="orbit"></div>
    <div id="orbit2" class="orbit"></div>
    <div id="orbit3" class="orbit"></div>
    <div id="orbit4" class="orbit"></div>

    <img class="girl" src="gif/anime-girl.gif">

</div>

<div class="footer-text">DATs X FUNTIME</div>

<audio id="audio-ball2" src="song/my-song-44.mp3"></audio>

<script>
const balls = document.querySelectorAll('.ball1, .ball2, .ball3, .ball4');
const asteroid = document.getElementById('asteroid');
const audioBall2 = document.getElementById('audio-ball2');

const orbits = {
    ball1: { el: orbit1, text: "Velfarre 2002" },
    ball2: { el: orbit2, text: "Xenon 1996" },
    ball3: { el: orbit3, text: "Twin Star 1999" },
    ball4: { el: orbit4, text: "9LoveJ 2001" }
};

function createSVGOrbit(container, text) {
    container.innerHTML = "";
    const radius = 70;

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 200 200");

    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    const id = "circlePath" + Math.random();

    path.setAttribute("id", id);
    path.setAttribute("d",
        `M 100,100
         m -${radius},0
         a ${radius},${radius} 0 1,1 ${radius*2},0
         a ${radius},${radius} 0 1,1 -${radius*2},0`
    );

    defs.appendChild(path);
    svg.appendChild(defs);

    const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    const textPath = document.createElementNS("http://www.w3.org/2000/svg", "textPath");

    textPath.setAttributeNS("http://www.w3.org/1999/xlink", "href", "#" + id);
    textPath.setAttribute("startOffset", "50%");
    textPath.setAttribute("text-anchor", "middle");

    textPath.textContent = text + " • " + text;

    textEl.appendChild(textPath);
    svg.appendChild(textEl);

    container.appendChild(svg);
}

function positionOrbit(orbitEl, targetEl) {
    const rect = targetEl.getBoundingClientRect();
    const parentRect = document.querySelector('.scene').getBoundingClientRect();

    orbitEl.style.left = (rect.left - parentRect.left + rect.width/2 - 100) + "px";
    orbitEl.style.top = (rect.top - parentRect.top + rect.height/2 - 100) + "px";
}

balls.forEach(el => {
    el.addEventListener('click', () => {

        const isActive = el.classList.contains('active');

        // RESET ALL
        balls.forEach(b => {
            b.classList.remove('active');
            b.style.animation = "breathe 4s ease-in-out infinite";
        });

        Object.values(orbits).forEach(o => o.el.style.display = "none");

        audioBall2.pause();
        audioBall2.currentTime = 0;
        asteroid.style.transform = "translateY(0px)";

        // TOGGLE OFF
        if (isActive) return;

        // ACTIVATE
        el.classList.add('active');
        el.style.animation = "none";

        const key = [...el.classList].find(c => c.startsWith('ball'));
        const orbit = orbits[key];

        if (orbit) {
            createSVGOrbit(orbit.el, orbit.text);
            positionOrbit(orbit.el, el);
            orbit.el.style.display = "block";
        }

        if (el.classList.contains('ball2')) {
            asteroid.style.transform = "translateY(60px)";
            audioBall2.play();
        }
    });
});
</script>

</body>
</html>
