<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- DISABLE ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>FUNTIME LOCKED</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

/* FIXED CANVAS */
.scene {
    position:absolute;

    width:1080px;
    height:1080px;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);
}

/* BACKGROUND */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* EARTH */
.earth {
    position:absolute;
    width:260px;
    top:300px;
    left:270px;
}

/* GIRL */
.girl {
    position:absolute;
    width:420px;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
}

img {
    display:block;
}
</style>
</head>

<body>

<div class="scene">

    <!-- BG -->
    <img class="bg" src="gif/galaxy.gif">

    <!-- EARTH -->
    <img class="earth" src="gif/earth.gif">

    <!-- GIRL -->
    <img class="girl" src="gif/anime-girl.gif">

</div>

</body>
</html>
