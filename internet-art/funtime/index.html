<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FUNTIME RELEASE</title>

<style>
html, body {
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
    font-family: monospace;
}

/* SCENE */
.scene {
    position:fixed;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* LAYER BASE */
.layer {
    position:absolute;
    will-change: transform;
    pointer-events:none;
}

/* CENTER TITLE */
.title {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    z-index:100;
    pointer-events:auto;
}

.title h1 {
    font-size:clamp(24px, 5vw, 80px);
    letter-spacing:4px;
}

.title p {
    opacity:0.7;
    font-size:14px;
}

/* CLICK AREA */
.cta {
    margin-top:20px;
    padding:10px 20px;
    border:1px solid white;
    cursor:pointer;
    display:inline-block;
    transition:0.2s;
}
.cta:hover {
    background:white;
    color:black;
}

/* IMAGE STYLE */
img {
    width:100%;
    height:auto;
    display:block;
}
</style>
</head>

<body>

<div class="scene" id="scene">

    <!-- BACKGROUND -->
    <div class="layer" data-depth="0.1" style="width:120%; top:-10%; left:-10%;">
        <img src="internet-art/funtime/gif/galaxy.gif">
    </div>

    <!-- EARTH -->
    <div class="layer" data-depth="0.2" style="width:400px; bottom:-50px; left:20%;">
        <img src="internet-art/funtime/gif/FUNTIME EARTH.gif">
    </div>

    <!-- ASTEROID -->
    <div class="layer" data-depth="0.3" style="width:300px; top:10%; right:10%;">
        <img src="internet-art/funtime/gif/ASTEROID.gif">
    </div>

    <!-- BALLS -->
    <div class="layer" data-depth="0.4" style="width:120px; top:20%; left:10%;">
        <img src="internet-art/funtime/gif/BALL 1 COMPRESS.gif">
    </div>

    <div class="layer" data-depth="0.5" style="width:150px; top:60%; left:30%;">
        <img src="internet-art/funtime/gif/BALL 2 COMPRESS.gif">
    </div>

    <div class="layer" data-depth="0.6" style="width:130px; top:40%; right:20%;">
        <img src="internet-art/funtime/gif/BALL 3 COMPRESS.gif">
    </div>

    <div class="layer" data-depth="0.7" style="width:180px; bottom:10%; right:5%;">
        <img src="internet-art/funtime/gif/BALL 4 COMPRESS.gif">
    </div>

    <!-- ANIME GIRL -->
    <div class="layer" data-depth="0.9" style="width:300px; bottom:0; left:50%; transform:translateX(-50%);">
        <img src="internet-art/funtime/gif/ANIME GIRL.gif">
    </div>

    <!-- TITLE -->
    <div class="title">
        <h1>FUNTIME</h1>
        <p>NEW RELEASE</p>
        <div class="cta">PLAY</div>
    </div>

</div>

<script>
const scene = document.getElementById('scene');
const layers = document.querySelectorAll('.layer');

let mouseX = 0;
let mouseY = 0;

window.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth - 0.5);
    mouseY = (e.clientY / window.innerHeight - 0.5);
});

/* ANIMATION LOOP */
function animate(){
    layers.forEach(layer => {
        const depth = layer.getAttribute('data-depth');

        const moveX = mouseX * depth * 50;
        const moveY = mouseY * depth * 50;

        layer.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });

    requestAnimationFrame(animate);
}

animate();

/* FLOATING DRIFT */
layers.forEach(layer => {
    let offset = Math.random() * 1000;

    function drift(){
        offset += 0.01;

        const y = Math.sin(offset) * 10;
        layer.style.top = `calc(${layer.style.top || "0px"} + ${y}px)`;

        requestAnimationFrame(drift);
    }

    drift();
});
</script>

</body>
</html>
