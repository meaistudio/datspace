<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- DISABLE ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>FUNTIME LOCKED</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

/* FIXED CANVAS */
.scene {
    position:absolute;

    width:1080px;
    height:1080px;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);
}

/* BACKGROUND */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

.asteroid {
    position:absolute;
    width:100%;
    top:350px;
}

/* EARTH */
.earth {
    position:absolute;
    width:220px;
    top:180px;
    left:340px;
}

/* ball 1 */
.ball1 {
    position:absolute;
    width:120px;
    top:180px;
    left:600px;
}

    /* ball 2 */
.ball2 {
    position:absolute;
    width:100px;
    top:450px;
    left:380px;
}
    /* ball 3 */
.ball3 {
    position:absolute;
    width:90px;
    top:630px;
    left:450px;
}
    /* ball 4 */
.ball4 {
    position:absolute;
    width:160px;
    top:730px;
    left:350px;
}
    


/* GIRL */
.girl {
    position:absolute;
    width:420px;
    bottom:160px;
    left:55%;
    transform:translateX(-50%);
}

img {
    display:block;
}
</style>
</head>

<body>

<div class="scene">

    <!-- BG -->
    <img class="bg" src="gif/galaxy.gif">

    <!-- BG -->
    <img class="asteroid" src="gif/asteroid.gif">

    <!-- EARTH -->
    <img class="earth" src="gif/earth.gif">

    <!-- EARTH -->
    <img class="ball1" src="gif/ball-1.gif">

    <!-- EARTH -->
    <img class="ball2" src="gif/ball-2.gif">

    <!-- EARTH -->
    <img class="ball3" src="gif/ball-3.gif">

    <!-- EARTH -->
    <img class="ball4" src="gif/ball-4.gif">
    
    <!-- GIRL -->
    <img class="girl" src="gif/anime-girl.gif">

</div>

</body>
</html>
