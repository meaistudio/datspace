<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>FUNTIME LOCKED</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

/* SCENE */
.scene {
    position:absolute;
    width:1080px;
    height:1080px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* BACKGROUND */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    pointer-events:none;
}

/* ASTEROID */
.asteroid {
    position:absolute;
    width:100%;
    top:350px;
    z-index:1;
    pointer-events:none;
    transition: transform 0.5s ease;
}

/* EARTH */
.earth {
    position:absolute;
    width:220px;
    top:180px;
    left:340px;
    z-index:3;
}

/* BALLS */
.ball1 { position:absolute; width:120px; top:180px; left:600px; z-index:4; }
.ball2 { position:absolute; width:100px; top:450px; left:380px; z-index:4; }
.ball3 { position:absolute; width:90px;  top:630px; left:450px; z-index:4; }
.ball4 { position:absolute; width:160px; top:730px; left:350px; z-index:4; }

/* GIRL FLOAT */
@keyframes floatGirl {
    0%   { transform: translateX(-50%) translateY(0px); }
    50%  { transform: translateX(-50%) translateY(-10px); }
    100% { transform: translateX(-50%) translateY(0px); }
}

.girl {
    position:absolute;
    width:420px;
    bottom:160px;
    left:55%;
    transform:translateX(-50%);
    z-index:5;
    pointer-events:none;
    animation: floatGirl 5s ease-in-out infinite;
}

/* IMAGE */
img {
    display:block;
}

/* CLICKABLE */
.clickable {
    cursor:pointer;
    transition: transform 0.2s ease, filter 0.2s ease;
}

/* ACTIVE */
.active {
    transform: scale(1.2);
    filter: brightness(1.2);
}

/* FOOTER */
.footer-text {
    position:fixed;
    bottom:20px;
    left:20px;
    color:white;
    font-family: monospace;
    font-size:14px;
    letter-spacing:2px;
    opacity:0.7;
    z-index:999;
}

/* ORBIT TEXT */
.orbit {
    position:absolute;
    width:260px;
    height:260px;
    pointer-events:none;
    animation: spin 18s linear infinite; /* lebih pelan */
    display:none;
}

.orbit span {
    position:absolute;
    left:50%;
    top:50%;
    transform-origin:0 0;
    font-family:"Times New Roman", serif;
    font-size:18px; /* lebih besar */
    color:white;
    letter-spacing:3px;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="scene">

    <!-- BG -->
    <img class="bg" src="gif/galaxy.gif">

    <!-- ASTEROID -->
    <img id="asteroid" class="asteroid" src="gif/asteroid.gif">

    <!-- EARTH -->
    <img class="earth clickable" src="gif/earth.gif">

    <!-- BALLS -->
    <img class="ball1 clickable" src="gif/ball-1.gif">
    <img class="ball2 clickable" src="gif/ball-2.gif">
    <img class="ball3 clickable" src="gif/ball-3.gif">
    <img class="ball4 clickable" src="gif/ball-4.gif">

    <!-- ORBIT TEXT -->
    <div id="orbit1" class="orbit"></div>
    <div id="orbit2" class="orbit"></div>
    <div id="orbit3" class="orbit"></div>
    <div id="orbit4" class="orbit"></div>

    <!-- GIRL -->
    <img class="girl" src="gif/anime-girl.gif">

</div>

<div class="footer-text">DATs X FUNTIME</div>

<!-- AUDIO -->
<audio id="audio-ball2" src="song/my-song-44.mp3" preload="auto"></audio>

<script>
const items = document.querySelectorAll('.clickable');
const audioBall2 = document.getElementById('audio-ball2');
const asteroid = document.getElementById('asteroid');

const orbits = {
    ball1: { el: document.getElementById('orbit1'), text: "Velfarre 2002" },
    ball2: { el: document.getElementById('orbit2'), text: "Xenon 1996" },
    ball3: { el: document.getElementById('orbit3'), text: "Twin Star 1999" },
    ball4: { el: document.getElementById('orbit4'), text: "9LoveJ 2001" }
};

// create circular text
function createCircleText(container, text) {
    container.innerHTML = "";
    const radius = 110; // lebih besar
    const chars = text.split("");
    const angleStep = 360 / chars.length;

    chars.forEach((char, i) => {
        const span = document.createElement("span");
        span.innerText = char;

        const angle = i * angleStep;

        span.style.transform = `
            rotate(${angle}deg)
            translate(${radius}px)
            rotate(${-angle}deg)
        `;

        container.appendChild(span);
    });
}

// position orbit
function positionOrbit(orbitEl, targetEl) {
    const rect = targetEl.getBoundingClientRect();
    const parentRect = document.querySelector('.scene').getBoundingClientRect();

    orbitEl.style.left = (rect.left - parentRect.left + rect.width/2 - 130) + "px";
    orbitEl.style.top = (rect.top - parentRect.top + rect.height/2 - 130) + "px";
}

items.forEach(el => {
    el.addEventListener('click', () => {

        const isActive = el.classList.contains('active');

        items.forEach(i => i.classList.remove('active'));
        Object.values(orbits).forEach(o => o.el.style.display = "none");

        audioBall2.pause();
        audioBall2.currentTime = 0;
        asteroid.style.transform = "translateY(0px)";

        if (!isActive) {
            el.classList.add('active');

            const key = [...el.classList].find(c => c.startsWith('ball'));
            const orbitData = orbits[key];

            if (orbitData) {
                createCircleText(orbitData.el, orbitData.text);
                positionOrbit(orbitData.el, el);
                orbitData.el.style.display = "block";
            }

            if (el.classList.contains('ball1')) {
                asteroid.style.transform = "translateY(20px)";
            }

            if (el.classList.contains('ball2')) {
                asteroid.style.transform = "translateY(60px)";
                audioBall2.play().catch(err => console.log(err));
            }

            if (el.classList.contains('ball3')) {
                asteroid.style.transform = "translateY(100px)";
            }

            if (el.classList.contains('ball4')) {
                asteroid.style.transform = "translateY(150px)";
            }
        }
    });
});
</script>

</body>
</html>
