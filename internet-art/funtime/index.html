<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FUNTIME BASE</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

.scene {
    position:relative;
    width:100vw;
    height:100vh;
}

/* ANIME GIRL (CENTER) */
.girl {
    position:absolute;
    width:420px;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
}

/* EARTH (LEFT TOP) */
.earth {
    position:absolute;
    width:260px;
    top:10%;
    left:10%;
}

/* IMAGE */
img {
    width:100%;
    display:block;
}
</style>
</head>

<body>

<div class="scene">

    <!-- EARTH -->
    <img class="earth" src="gif/funtime-earth.gif">

    <!-- ANIME GIRL -->
    <img class="girl" src="gif/anime-girl.gif">

</div>

</body>
</html>
