<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FUNTIME BASE</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
}

.scene {
    position:relative;
    width:100vw;
    height:100vh;
}

/* BACKGROUND */
.bg {
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    object-fit:cover; /* penting supaya full cover */
    z-index:0;
}

/* EARTH */
.earth {
    position:absolute;
    width:260px;
    top:10%;
    left:10%;
    z-index:2;
}

/* ANIME GIRL */
.girl {
    position:absolute;
    width:420px;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    z-index:3;
}

/* IMAGE */
img {
    display:block;
}
</style>
</head>

<body>

<div class="scene">

    <!-- BACKGROUND -->
    <img class="bg" src="gif/galaxy.gif">

    <!-- EARTH -->
    <img class="earth" src="gif/funtime-earth.gif">

    <!-- ANIME GIRL -->
    <img class="girl" src="gif/anime-girl.gif">

</div>

</body>
</html>
