<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUU</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    overflow-y: hidden;
    background: black;
}

/* SCENE */
.scene {
    position: relative;

    width: 100vw;
    height: 500px; /* LOCK HEIGHT */

    max-height: 500px;
    min-height: 500px;

    overflow: hidden;
}

/* JALAN (LEBIH BESAR + TURUN) */
.road {
    position: absolute;
    bottom: -200px; /* ⬇️ turun ke bawah */

    left: 0;
    width: 200%;

    height: 600px; /* ⬆️ diperbesar */

    background: url("gif/jalan.gif");
    background-repeat: repeat-x;
    background-size: auto 100%;

    animation: roadMove 5s linear infinite;
}

@keyframes roadMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* TRUK */
.truck {
    position: absolute;
    width: 600px;
    image-rendering: pixelated;
    pointer-events: none;
    will-change: transform;
}

/* MOBILE */
@media (max-width: 600px) {
    .truck {
        width: 300px;
    }
}
</style>
</head>

<body>

<div class="scene">
    <div class="road"></div>
</div>

<script>
const scene = document.querySelector(".scene");

let trucks = [];
const maxTrucks = 10;

// HARUS sama dengan CSS .road height
const roadHeight = 450;

// CREATE TRUCK
function createTruck() {
    if (trucks.length >= maxTrucks) return;

    const truck = document.createElement("img");
    truck.src = "gif/Truk sampah.gif";
    truck.classList.add("truck");

    // depth system
    const depth = Math.random() * 10;
    const scale = 1.2 - (depth / 20);

    // posisi mengikuti jalan baru
    const bottomOffset = (roadHeight * 0.05) + depth * 6;

    truck.style.bottom = bottomOffset + "px";
    truck.style.zIndex = Math.floor(100 - depth);
    truck.dataset.scale = scale;

    let x = -800;
    const speed = Math.random() * 3 + 1;

    scene.appendChild(truck);

    function animate() {
        x += speed;

        const randomY = (Math.random() - 0.5) * 4;
        const randomRotate = (Math.random() - 0.5) * 1;
        const scale = truck.dataset.scale;

        truck.style.transform = `
            translateX(${x}px)
            translateY(${randomY}px)
            rotate(${randomRotate}deg)
            scale(${scale})
        `;

        if (x > window.innerWidth + 800) {
            cancelAnimationFrame(truck._anim);
            truck.remove();
            trucks = trucks.filter(t => t !== truck);
            return;
        }

        truck._anim = requestAnimationFrame(animate);
    }

    animate();
    trucks.push(truck);
}

// CLICK SPAWN
window.addEventListener("click", createTruck);

// INIT
createTruck();
</script>

</body>
</html>
