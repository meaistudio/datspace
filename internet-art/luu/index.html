<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUU</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }

    .scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    /* Jalan background */
    .road {
        position: absolute;
        width: 200%;
        height: 100%;
        background: url("gif/jalan.gif");
        background-repeat: repeat-x;
        background-size: contain;
        animation: roadMove 5s linear infinite;
    }

    @keyframes roadMove {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
    }

    /* Truk */
    .truck {
        position: absolute;
        bottom: 10%;
        width: 800px;
        image-rendering: pixelated;
        animation: moveTruck 10s linear infinite;
    }

    @keyframes moveTruck {
        from { left: -600px; }
        to { left: 110%; }
    }
</style>
</head>

<body>

<div class="scene">
    <div class="road"></div>

    <img 
        src="gif/Truk sampah.gif"
        class="truck" 
        id="truck">
</div>

<script>
const scene = document.querySelector(".scene");

let trucks = [];
let maxTrucks = 10;

// fungsi buat truk baru
function createTruck() {
    const truck = document.createElement("img");
    truck.src = "gif/Truk sampah.gif";
    truck.classList.add("truck");

    // random posisi & speed
    let baseX = -600;
    let speed = Math.random() * 3 + 1; // 1–4
    let baseY = Math.random() * 20; // variasi tinggi

    truck.style.bottom = (10 + baseY) + "%";

    scene.appendChild(truck);

    function animate() {
        baseX += speed;

        const randomY = (Math.random() - 0.5) * 10;
        const randomRotate = (Math.random() - 0.5) * 2;

        truck.style.transform = `
            translateX(${baseX}px)
            translateY(${randomY}px)
            rotate(${randomRotate}deg)
        `;

        if (baseX > window.innerWidth + 600) {
            baseX = -600;
        }

        truck._anim = requestAnimationFrame(animate);
    }

    animate();

    trucks.push(truck);
}

// klik = tambah truk
window.addEventListener("click", () => {
    if (trucks.length < maxTrucks) {
        createTruck();
    } else {
        reduceTrucks();
    }
});

// fungsi mengurangi truk
function reduceTrucks() {
    let interval = setInterval(() => {
        if (trucks.length > 1) {
            const truck = trucks.shift();
            cancelAnimationFrame(truck._anim);
            truck.remove();
        } else {
            clearInterval(interval);
        }
    }, 500);
}

// mulai dengan 1 truk
createTruck();
</script>

</body>
</html>
