<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUU</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }

    .scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    /* Jalan background */
    .road {
        position: absolute;
        width: 200%;
        height: 100%;
        background: url("gif/jalan.gif");
        background-repeat: repeat-x;
        background-size: contain;
        animation: roadMove 5s linear infinite;
    }

    @keyframes roadMove {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
    }

    /* Truk */
    .truck {
        position: absolute;
        width: 800px;
        image-rendering: pixelated;
        pointer-events: none;
        will-change: transform;
    }

</style>
</head>

<body>

<div class="scene">
    <div class="road"></div>
</div>

<script>
const scene = document.querySelector(".scene");

let trucks = [];
const maxTrucks = 10;

// buat truk baru
function createTruck() {
    if (trucks.length >= maxTrucks) return;

    const truck = document.createElement("img");
    truck.src = "gif/Truk sampah.gif";
    truck.classList.add("truck");

    // depth (posisi + layer + scale)
    const depth = Math.random() * 10;
    const scale = 1.2 - (depth / 20);

    truck.style.bottom = depth + "%";
    truck.style.zIndex = Math.floor(100 - depth);
    truck.dataset.scale = scale;

    let x = -800;
    const speed = Math.random() * 3 + 1;

    scene.appendChild(truck);

    function animate() {
        x += speed;

        const randomY = (Math.random() - 0.5) * 6;
        const randomRotate = (Math.random() - 0.5) * 1.5;
        const scale = truck.dataset.scale;

        truck.style.transform = `
            translateX(${x}px)
            translateY(${randomY}px)
            rotate(${randomRotate}deg)
            scale(${scale})
        `;

        // keluar layar → hapus
        if (x > window.innerWidth + 800) {
            cancelAnimationFrame(truck._anim);
            truck.remove();
            trucks = trucks.filter(t => t !== truck);
            return;
        }

        truck._anim = requestAnimationFrame(animate);
    }

    animate();
    trucks.push(truck);
}

// klik untuk tambah truk
window.addEventListener("click", () => {
    createTruck();
});

// mulai dengan 1 truk
createTruck();
</script>

</body>
</html>
