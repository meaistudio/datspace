<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUU</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

/* SCENE */
.scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* JALAN (FIXED SIZE, TIDAK STRETCH) */
.road {
    position: absolute;
    bottom: 50;
    left: 0;

    width: 200%;
    height: 900px; /* FIXED HEIGHT */

    background: url("gif/jalan.gif");
    background-repeat: repeat-x;
    background-size: auto 100%; /* tidak berubah rasio */

    animation: roadMove 5s linear infinite;
}

@keyframes roadMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* TRUK */
.truck {
    position: absolute;
    width: 800px;
    image-rendering: pixelated;
    pointer-events: none;
    will-change: transform;
}

/* MOBILE */
@media (max-width: 600px) {
    .road {
        bottom: 10%;
    }
    
    .truck {
        width: 400px;
    }
}
</style>
</head>

<body>

<div class="scene">
    <div class="road"></div>
</div>

<script>
const scene = document.querySelector(".scene");

let trucks = [];
const maxTrucks = 10;

// tinggi jalan (HARUS sama dengan CSS)
const roadHeight = 300;

// buat truk
function createTruck() {
    if (trucks.length >= maxTrucks) return;

    const truck = document.createElement("img");
    truck.src = "gif/Truk sampah.gif";
    truck.classList.add("truck");

    // depth (layer + scale)
    const depth = Math.random() * 10;
    const scale = 1.2 - (depth / 20);

    // posisi truk selalu relatif ke jalan (PIXEL, bukan %)
    const bottomOffset = roadHeight * 0.1 + depth * 5;

    truck.style.bottom = bottomOffset + "px";
    truck.style.zIndex = Math.floor(100 - depth);
    truck.dataset.scale = scale;

    let x = -800;
    const speed = Math.random() * 3 + 1;

    scene.appendChild(truck);

    function animate() {
        x += speed;

        const randomY = (Math.random() - 0.5) * 5;
        const randomRotate = (Math.random() - 0.5) * 1.2;
        const scale = truck.dataset.scale;

        truck.style.transform = `
            translateX(${x}px)
            translateY(${randomY}px)
            rotate(${randomRotate}deg)
            scale(${scale})
        `;

        // keluar layar → hapus
        if (x > window.innerWidth + 800) {
            cancelAnimationFrame(truck._anim);
            truck.remove();
            trucks = trucks.filter(t => t !== truck);
            return;
        }

        truck._anim = requestAnimationFrame(animate);
    }

    animate();
    trucks.push(truck);
}

// klik tambah truk
window.addEventListener("click", createTruck);

// mulai dengan 1 truk
createTruck();
</script>

</body>
</html>
