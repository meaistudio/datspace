<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adep Adep-in</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

/* COUNTER */
#counter {
  position: fixed;
  top: 20px;
  left: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 12px 18px;
  font-size: 18px;
  z-index: 10;
}

/* BUTTONS */
.button-container {
  position: fixed;
  bottom: 60px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
  z-index: 10;
}

button {
  background: #c40000;
  color: white;
  border: none;
  padding: 18px 40px;
  font-size: 20px;
  cursor: pointer;
}

button:hover {
  background: #ff0000;
}

/* STAMP SAH */
#stamp {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-15deg);
  font-size: 120px;
  font-weight: bold;
  color: rgba(200,0,0,0.85);
  border: 8px solid rgba(200,0,0,0.85);
  padding: 20px 60px;
  display: none;
  z-index: 1000;
}

/* IKLAN */
#iklan-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 999;
}

#iklan-text {
  color: white;
  font-size: 42px;
  font-weight: bold;
  max-width: 800px;
  line-height: 1.4;
  padding: 40px;
}
</style>
</head>

<body>

<div id="counter">Tanah dibeli: 0</div>

<div class="button-container">
  <button onclick="beliTanah()">BELI</button>
  <button onclick="skipTanah()">SKIP</button>
</div>

<div id="stamp">SAH</div>

<div id="iklan-overlay">
  <div id="iklan-text"></div>
</div>

<script>
let tanahDibeli = 0;

/* RANDOM BACKGROUND 1-14 */
function setRandomBackground() {
  const totalImages = 14;
  const randomNumber = Math.floor(Math.random() * totalImages) + 1;

  document.body.style.backgroundImage =
    `url("internet-art/adep-adepin/png/${randomNumber}.png")`;
}

setRandomBackground();

/* UPDATE COUNTER */
function updateCounter() {
  document.getElementById("counter").innerText =
    "Tanah dibeli: " + tanahDibeli;
}

/* PLAY MULTIPLE SOUNDS */
function playSound(src) {
  const audio = new Audio(src);
  audio.play();
}

/* STAMP */
function showStamp() {
  const stamp = document.getElementById("stamp");
  stamp.style.display = "block";

  setTimeout(() => {
    stamp.style.display = "none";
  }, 800);
}

/* IKLAN */
function showIklan(type) {
  const overlay = document.getElementById("iklan-overlay");
  const text = document.getElementById("iklan-text");

  if (type === "harley") {
    text.innerHTML = `
      ANDA SUDAH PUNYA 4 TANAH.<br><br>
      WAKTUNYA NAIK KELAS.<br>
      BELI HARLEY DAVIDSON SEKARANG.
    `;
  }

  if (type === "rubycon") {
    text.innerHTML = `
      INVESTASI ANDA TERLIHAT SERIUS.<br><br>
      SAATNYA BERPINDAH KE RUBYCON.<br>
      STABIL. TAHAN LAMA. ELIT.
    `;
  }

  overlay.style.display = "flex";

  setTimeout(() => {
    overlay.style.display = "none";
  }, 3000);
}

/* BELI */
function beliTanah() {
  tanahDibeli++;

  updateCounter();
  showStamp();
  setRandomBackground();

  // SOUND BELI
  playSound("internet-art/adep-adepin/sound/suksma.wav");
  playSound("internet-art/adep-adepin/sound/money.mp3");

  if (tanahDibeli > 5) {
    showIklan("rubycon");
  } else if (tanahDibeli > 3) {
    showIklan("harley");
  }
}

/* SKIP */
function skipTanah() {
  playSound("internet-art/adep-adepin/sound/nggih.wav");
}
</script>

</body>
</html>
