<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DATs X FUNTIME</title>

<link rel="icon" type="image/png" href="/dats.png">

<style>
html, body{
    margin:0;
    padding:0;
    background:black;
    color:white;
    font-family:Consolas, monospace;
    overflow:hidden;
}

/* CENTER SYSTEM */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    text-align:center;
}

/* TITLE */
.title{
    font-size:70px;
    letter-spacing:6px;
    margin-bottom:20px;
}

/* SUBTEXT */
.subtitle{
    font-size:18px;
    opacity:0.5;
    letter-spacing:2px;
}

/* SMALL SYSTEM TEXT */
.meta{
    position:absolute;
    bottom:40px;
    font-size:12px;
    opacity:0.3;
    letter-spacing:1px;
}

/* OPTIONAL BACK */
.back{
    position:absolute;
    top:40px;
    left:40px;
    font-size:20px;
    color:white;
    text-decoration:none;
    opacity:0.6;
}

.back:hover{
    opacity:1;
}

/* SUBTLE BLINK */
@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.2;}
    100%{opacity:1;}
}

.subtitle{
    animation:blink 3s infinite;
}
</style>
</head>

<body>

<a href="/" class="back">← HOME</a>

<div class="wrapper">
    <div class="title">COMING SOON</div>
    <div class="subtitle">INTERNET ART SYSTEM INITIALIZING</div>
</div>

<div class="meta">
    DATSPACE / SIGNAL NOT READY / 2026
</div>

</body>
</html>
