<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IMADJI - CUP COLLECTOR</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: monospace;
      user-select: none;
      touch-action: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* KONTAINER UTAMA 9:16 */
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: calc(100vh * (9 / 16));
      max-height: calc(100vw * (16 / 9));
      background: #000;
      overflow: hidden;
      container-type: size;
      container-name: game;
    }

    /* OVERLAY PERINGATAN UKURAN LAYAR */
    #size-warning {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      place-items: center;
      text-align: center;
      padding: 20px;
    }

    #size-warning p {
      border: 2px solid #fff;
      padding: 20px;
      font-size: 16px;
      line-height: 1.6;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* MATIKAN GAME JIKA DI BAWAH 375x667 */
    @media (max-width: 374px), (max-height: 666px) {
      #game-container {
        display: none !important;
      }
      #size-warning {
        display: grid;
      }
    }

    input, button {
      font-family: monospace;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .screen,
    .hud,
    .logo-row,
    .visit-fixed {
      position: absolute;
      z-index: 2;
    }

    .screen {
      inset: 0;
      display: grid;
      place-items: center;
      padding: 4cqw;
      box-sizing: border-box;
      text-align: center;
    }

    .screen[hidden],
    .hud[hidden],
    .visit-fixed[hidden],
    .logo-row[hidden] {
      display: none;
    }

    .panel {
      display: grid;
      justify-items: center;
      gap: 2cqh;
      width: 100%;
      text-shadow: 2px 2px 0 #000;
    }

    .logo-row {
      top: 3cqh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 3cqw;
      pointer-events: none;
    }

    .logo-row img {
      height: clamp(24px, 16cqw, 182px);
      width: auto;
      display: block;
    }

    .logo-x {
      font-size: clamp(18px, 10cqw, 100px);
      line-height: 1;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
    }

    .visit-fixed {
      left: 50%;
      bottom: 4cqh;
      transform: translateX(-50%);
      z-index: 5;
      font-size: clamp(12px, 4cqw, 40px);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: auto;
    }

    .visit-fixed a {
      display: inline-block;
      padding: 1cqh 2.5cqw;
      color: #fff;
      background: #000;
      border: 2px solid #fff;
      text-decoration: none;
      transition: color 120ms ease, background 120ms ease;
      touch-action: manipulation;
    }

    .visit-fixed a:hover {
      color: #000;
      background: #fff;
    }

    .kicker {
      margin: 0;
      font-size: clamp(14px, 3.5cqw, 28px);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .home-title-img {
      width: 88cqw;
      max-width: 720px;
      height: auto;
      display: block;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    @keyframes blinkStart {
      0%, 45% { opacity: 1; filter: none; }
      46%, 55% { opacity: 0.2; filter: invert(1); }
      56%, 100% { opacity: 1; filter: none; }
    }

    .btn-action {
      display: inline-block;
      padding: 1.5cqh 4cqw;
      color: #fff;
      background: #000;
      border: 2px solid #fff;
      font-size: clamp(14px, 4cqw, 24px);
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      transition: transform 140ms ease, background 120ms ease, color 120ms ease;
    }

    .btn-action:hover {
      transform: scale(1.04);
      background: #fff;
      color: #000;
    }

    .start-img-button {
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      margin-top: 1cqh;
      transition: transform 140ms ease;
    }

    .start-img-button:hover {
      transform: scale(1.04);
    }

    .start-img-button img {
      width: 44cqw;
      max-width: 220px;
      height: auto;
      display: block;
      animation: blinkStart 1.1s steps(1) infinite;
    }

    .hud {
      inset: 3cqh 3cqw auto 3cqw;
      display: flex;
      justify-content: flex-start;
      pointer-events: none;
      z-index: 3;
    }

    .hud-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5cqw;
      align-items: flex-start;
    }

    .hud-item,
    .score-pill {
      display: inline-flex;
      align-items: center;
      gap: 2cqw;
      padding: 1cqh 2cqw;
      background: #000;
      border: 2px solid #fff;
    }

    .hud-label-img,
    .score-pill-label {
      height: clamp(13px, 2.8cqw, 28px);
      width: auto;
      display: block;
    }

    .number-img-row {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 1.5cqw;
      min-height: clamp(13px, 2.8cqw, 28px);
    }

    .number-img-row img {
      height: clamp(13px, 2.8cqw, 28px);
      width: auto;
      display: block;
    }

    .number-fallback {
      color: #fff;
      font-size: clamp(12px, 2.5cqw, 22px);
      line-height: 1;
    }

    .top-score-title {
      width: 74cqw;
      max-width: 360px;
      height: auto;
      display: block;
    }

    .score-summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2cqw;
    }

    .top-score-list {
      display: grid;
      gap: 0.8cqh;
      width: 86cqw;
      max-width: 420px;
      max-height: 35cqh;
      overflow-y: auto;
    }

    .top-score-row {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 2cqw;
      padding: 1cqh 2cqw;
      background: #000;
      border: 2px solid #fff;
      font-size: clamp(12px, 2.5cqw, 20px);
      text-align: left;
    }

    .top-score-row span:first-child {
      opacity: 0.7;
    }

    .top-score-row .number-img-row {
      justify-content: flex-end;
      margin-left: 0;
    }

    .submit-score {
      display: grid;
      gap: 1.5cqh;
      justify-items: center;
      width: 100%;
    }

    .submit-score input {
      width: 76cqw;
      max-width: 280px;
      padding: 1cqh 2cqw;
      color: #fff;
      background: #000;
      border: 2px solid #fff;
      font: inherit;
      text-align: center;
      box-sizing: border-box;
      font-size: clamp(12px, 3cqw, 18px);
    }

    #initialInput {
      text-transform: uppercase; 
    }

    #igInput {
      text-transform: lowercase; 
    }

    .submit-score input::placeholder {
      color: rgba(255, 255, 255, 0.68);
      text-transform: uppercase;
    }

    .button-group {
      display: flex;
      gap: 3cqw;
      justify-content: center;
      width: 100%;
    }

    @container game (max-width: 600px) {
      .hud-item, .score-pill {
        border-width: 1px;
        padding: 0.5cqh 1.5cqw;
      }
      .top-score-row {
        grid-template-columns: 25px 1fr auto;
      }
    }
  </style>
</head>

<body>
  
  <div id="size-warning">
    <p>LAYAR TERLALU KECIL<br><br>Minimal Resolusi:<br>375 x 667</p>
  </div>

  <div id="game-container">
    <canvas id="canvas"></canvas>

    <div class="logo-row">
      <img src="asset/imadji.webp" alt="Imadji">
      <span class="logo-x">X</span>
      <img src="asset/dats.webp" alt="DATs">
    </div>

    <div id="visitLink" class="visit-fixed">
      <a href="https://datspace.club" target="_blank" rel="noopener noreferrer">KUNJUNGI datspace.club</a>
    </div>

    <main id="screen" class="screen">
      </main>

    <div id="hud" class="hud" hidden>
      <div class="hud-group">
        <div class="hud-item">
          <img class="hud-label-img" src="asset/score.webp" alt="Score">
          <span id="scoreText" class="number-img-row"></span>
        </div>
        <div class="hud-item">
          <img class="hud-label-img" src="asset/best.webp" alt="Best">
          <span id="bestText" class="number-img-row"></span>
        </div>
        <div class="hud-item">
          <img class="hud-label-img" src="asset/life.webp" alt="Life">
          <span id="lifeText" class="number-img-row"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });

    // === URL ENDPOINT WEB APP SCRIPT ===
    const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbzZmC9hqt_D0_SMzwZpU5Buawfn-LPfQh1xp6qyiBd_saQM17TsnpfEjWNpXsdLaz12/exec"; 

    const TOP_SCORE_KEY = "imadjiTopScores";

    const container = document.getElementById("game-container");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const screen = document.getElementById("screen");
    const hud = document.getElementById("hud");
    const visitLink = document.getElementById("visitLink");
    const logoRow = document.querySelector(".logo-row");
    const scoreText = document.getElementById("scoreText");
    const bestText = document.getElementById("bestText");
    const lifeText = document.getElementById("lifeText");

    let gameWidth = 0;
    let gameHeight = 0;

    let globalJsonpResolver = null;

    const asset = {
      extBg: "asset/imadji_yos_ext.webp",
      inBg: "asset/imadji_yos_in.webp",
      cup: "asset/cup.webp",
      ice: "asset/ice.webp",
      bean: "asset/bean.webp"
    };

    const img = {};
    Object.keys(asset).forEach((key) => {
      img[key] = new Image();
      img[key].src = asset[key];
    });

    const digitImg = {};
    for (let i = 0; i <= 9; i++) {
      digitImg[i] = new Image();
      digitImg[i].src = `asset/${i}.webp`;
    }

    const game = {
      mode: "start",
      score: 0,
      best: Number(localStorage.getItem("imadjiCoffeeBest") || 0),
      lives: 3,

      cupX: 0,
      cupY: 0,
      cupW: 250,

      beanSize: 92,
      iceSize: 86,

      items: [],
      lastSpawn: 0,
      lastTime: 0,
      spawnRate: 780,

      dragging: false,
      keys: { left: false, right: false }
    };

    function isCompactScreen() {
      return gameWidth <= 768;
    }

    function currentCupWidth() {
      return isCompactScreen() ? game.cupW * 0.55 : game.cupW;
    }

    function currentBeanSize() {
      return isCompactScreen() ? game.beanSize * 0.55 : game.beanSize;
    }

    function currentIceSize() {
      return isCompactScreen() ? game.iceSize * 0.55 : game.iceSize;
    }

    function resize() {
      const rect = container.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;

      const dpr = window.devicePixelRatio || 1;
      gameWidth = rect.width;
      gameHeight = rect.height;

      canvas.width = gameWidth * dpr;
      canvas.height = gameHeight * dpr;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      game.cupX ||= gameWidth / 2;
      game.cupY = gameHeight - Math.max(104, gameHeight * 0.13);
    }

    function imageHeightByWidth(image, width) {
      if (!image || !image.naturalWidth || !image.naturalHeight) return width;
      return width / (image.naturalWidth / image.naturalHeight);
    }

    function getTopScoresLocal() {
      return JSON.parse(localStorage.getItem(TOP_SCORE_KEY) || "[]");
    }

    function saveTopScoreLocal(entry) {
      let scores = getTopScoresLocal();
      const existingIdx = scores.findIndex(
        item => item.initials === entry.initials && item.instagram.toLowerCase() === entry.instagram.toLowerCase()
      );

      if (existingIdx !== -1) {
        if (entry.score > scores[existingIdx].score) {
          scores[existingIdx].score = entry.score;
        }
      } else {
        scores.push(entry);
      }

      scores.sort((a, b) => b.score - a.score);
      localStorage.setItem(TOP_SCORE_KEY, JSON.stringify(scores.slice(0, 10)));
    }

    async function submitToSheet(entry) {
      if (!SHEET_ENDPOINT) return;
      try {
        await fetch(SHEET_ENDPOINT, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(entry)
        });
      } catch (err) {
        console.error("Gagal mengirim data skor:", err);
      }
    }

    window.processOnlineLeaderboard = function(data) {
      if (globalJsonpResolver) {
        globalJsonpResolver(data);
      }
    };

    function renderNumber(target, value) {
      const text = String(Math.max(0, value));
      target.innerHTML = "";
      for (const digit of text) {
        const image = digitImg[digit];
        if (image && image.complete && image.naturalWidth > 0) {
          const numberImage = document.createElement("img");
          numberImage.src = `asset/${digit}.webp`;
          numberImage.alt = digit;
          target.appendChild(numberImage);
        } else {
          const fallback = document.createElement("span");
          fallback.className = "number-fallback";
          fallback.textContent = digit;
          target.appendChild(fallback);
        }
      }
    }

    function numberMarkup(value) {
      const text = String(Math.max(0, value));
      return `
        <span class="number-img-row">
          ${text.split("").map((digit) => `
            <img src="asset/${digit}.webp" alt="${digit}" onerror="this.outerHTML='<span class=&quot;number-fallback&quot;>${digit}</span>'">
          `).join("")}
        </span>
      `;
    }

    function updateHud() {
      renderNumber(scoreText, game.score);
      renderNumber(bestText, game.best);
      renderNumber(lifeText, game.lives);
    }

    function buildScoresMarkup(scoresArray) {
      if (!scoresArray || !scoresArray.length) {
        return `<p style="letter-spacing:1px; opacity:0.7;">BELUM ADA SKOR</p>`;
      }
      return `
        <div class="top-score-list">
          ${scoresArray.map((item, index) => `
            <div class="top-score-row">
              <span>${index + 1}</span>
              <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.initials}</span>
              ${numberMarkup(item.score)}
            </div>
          `).join("")}
        </div>
      `;
    }

    function showHomeScreen() {
      game.mode = "start";
      hud.hidden = true;
      screen.hidden = false;
      visitLink.hidden = false;
      logoRow.hidden = false;

      screen.innerHTML = `
        <section class="panel">
          <p class="kicker">INTERACTIVE GAME BY DATs</p>
          <img class="home-title-img" src="asset/home.webp" alt="Kopi Es Data">
          
          <button id="startBtn" class="start-img-button" type="button" aria-label="Start">
            <img src="asset/start.webp" alt="Start">
          </button>

          <button id="homeLeaderboardBtn" class="btn-action" type="button" style="margin-top: 1cqh;">
            LEADERBOARD
          </button>
        </section>
      `;

      document.getElementById("startBtn").onclick = startGame;
      document.getElementById("homeLeaderboardBtn").onclick = showLeaderboardScreen;
    }

    async function showLeaderboardScreen() {
      game.mode = "leaderboard";
      
      screen.innerHTML = `
        <section class="panel">
          <img class="top-score-title" src="asset/top_score.webp" alt="Top Score" style="margin-top: 6cqh;">
          <p id="loadingText" style="letter-spacing:1px; opacity:0.7;">MEMUAT DATA TOP SCORE...</p>
        </section>
      `;

      let scoresMarkup = "";

      const fetchOnlineLeaderboard = () => {
        return new Promise((resolve, reject) => {
          globalJsonpResolver = resolve;

          const dynamicScript = document.createElement("script");
          dynamicScript.src = `${SHEET_ENDPOINT}?callback=processOnlineLeaderboard&_nocache=${Date.now()}`;
          dynamicScript.id = "jsonp-leaderboard-core";

          dynamicScript.onerror = () => {
            cleanUpScript();
            reject(new Error("Gagal load script"));
          };

          const cleanUpScript = () => {
            const currentScript = document.getElementById("jsonp-leaderboard-core");
            if (currentScript) currentScript.remove();
          };

          setTimeout(() => {
            cleanUpScript();
            reject(new Error("Timeout"));
          }, 4000);

          document.body.appendChild(dynamicScript);
        });
      };

      try {
        const rawScores = await fetchOnlineLeaderboard();
        if (rawScores && rawScores.length > 0) {
          const formattedScores = rawScores.map(item => ({
            initials: item.initials ? String(item.initials).toUpperCase() : "???",
            instagram: item.instagram ? String(item.instagram).toLowerCase() : "-",
            score: item.score ? Number(item.score) : 0
          }));
          scoresMarkup = buildScoresMarkup(formattedScores);
        } else {
          scoresMarkup = buildScoresMarkup([]);
        }
      } catch (err) {
        console.warn("Menggunakan data lokal browser karena timeout/CORS:", err);
        scoresMarkup = buildScoresMarkup(getTopScoresLocal());
      }

      screen.innerHTML = `
        <section class="panel">
          <img class="top-score-title" src="asset/top_score.webp" alt="Top Score" style="margin-top: 6cqh;">
          ${scoresMarkup}
          <button id="backToHomeBtn" class="btn-action" type="button" style="margin-top:2cqh;">
            KEMBALI
          </button>
        </section>
      `;
      
      document.getElementById("backToHomeBtn").onclick = showHomeScreen;
    }

    function startGame() {
      game.mode = "play";
      game.score = 0;
      game.lives = 3;
      game.items = [];
      game.spawnRate = 780;
      game.lastSpawn = performance.now();
      game.lastTime = performance.now();
      game.cupX = gameWidth / 2;

      screen.hidden = true;
      hud.hidden = false;
      visitLink.hidden = true;
      logoRow.hidden = true;

      updateHud();
    }

    function gameOver() {
      game.mode = "over";
      hud.hidden = true;
      screen.hidden = false;
      visitLink.hidden = false;
      logoRow.hidden = false;

      game.best = Math.max(game.best, game.score);
      localStorage.setItem("imadjiCoffeeBest", String(game.best));

      screen.innerHTML = `
        <section class="panel">
          <div class="score-summary" style="margin-top: 4cqh;">
            <div class="score-pill">
              <img class="score-pill-label" src="asset/score.webp" alt="Score">
              ${numberMarkup(game.score)}
            </div>
            <div class="score-pill">
              <img class="score-pill-label" src="asset/best.webp" alt="Best">
              ${numberMarkup(game.best)}
            </div>
          </div>
          
          <form id="scoreForm" class="submit-score">
            <input id="initialInput" minlength="3" maxlength="15" placeholder="USERNAME" required autocomplete="off" title="Username wajib 3 - 15 huruf">
            <input id="igInput" maxlength="40" placeholder="instagram" required autocomplete="off">
            
            <div class="button-group">
              <button class="btn-action" type="submit">SUBMIT SCORE</button>
              <button id="failRestartBtn" class="btn-action" type="button">RESTART</button>
            </div>
          </form>
        </section>
      `;

      document.getElementById("failRestartBtn").onclick = startGame;

      document.getElementById("scoreForm").onsubmit = async (event) => {
        event.preventDefault();
        
        const submitBtn = event.target.querySelector('button[type="submit"]');
        submitBtn.style.pointerEvents = 'none';
        submitBtn.style.opacity = '0.5';

        // Tidak di potong slice(0, 5) lagi agar bisa 15 huruf utuh
        const entry = {
          initials: document.getElementById("initialInput").value.trim().toUpperCase(),
          instagram: document.getElementById("igInput").value.trim().toLowerCase(),
          score: game.score
        };
        
        saveTopScoreLocal(entry);
        await submitToSheet(entry);
        
        setTimeout(showLeaderboardScreen, 500);
      };
    }

    function drawBg(image, label, darken = 0.34) {
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      if (image.complete && image.naturalWidth > 0) {
        const scale = Math.max(gameWidth / image.naturalWidth, gameHeight / image.naturalHeight);
        const w = image.naturalWidth * scale;
        const h = image.naturalHeight * scale;
        ctx.drawImage(image, (gameWidth - w) / 2, (gameHeight - h) / 2, w, h);
      } else {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, gameWidth, gameHeight);
        ctx.fillStyle = "#fff";
        ctx.font = "12px monospace";
        for (let y = 14; y < gameHeight; y += 26) {
          for (let x = y % 52; x < gameWidth; x += 52) {
            ctx.fillText(label, x, y);
          }
        }
      }

      ctx.fillStyle = `rgba(0,0,0,${darken})`;
      ctx.fillRect(0, 0, gameWidth, gameHeight);
      ctx.strokeStyle = "rgba(255,255,255,0.18)";

      for (let y = 0; y < gameHeight; y += 6) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(gameWidth, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function spawn(now) {
      if (now - game.lastSpawn < game.spawnRate) return;
      game.lastSpawn = now;
      game.spawnRate = Math.max(330, 780 - game.score * 7);

      const type = Math.random() > 0.58 ? "bean" : "ice";
      const size = type === "bean" ? currentBeanSize() : currentIceSize();

      game.items.push({
        type,
        x: 40 + Math.random() * Math.max(1, gameWidth - 80),
        y: -size,
        size,
        speed: 145 + Math.random() * 120 + game.score * 1.3,
        drift: (Math.random() - 0.5) * 46,
        spin: Math.random() * Math.PI
      });
    }

    function update(now) {
      const dt = Math.min(0.034, (now - game.lastTime) / 1000 || 0.016);
      game.lastTime = now;

      const cupWidth = currentCupWidth();
      const cupHeight = imageHeightByWidth(img.cup, cupWidth);

      if (game.keys.left) game.cupX -= 540 * dt;
      if (game.keys.right) game.cupX += 540 * dt;

      game.cupX = Math.max(cupWidth / 2, Math.min(gameWidth - cupWidth / 2, game.cupX));
      game.cupY = gameHeight - Math.max(cupHeight * 0.55, gameHeight * 0.13);

      spawn(now);

      const cupLeft = game.cupX - cupWidth / 2;
      const cupRight = game.cupX + cupWidth / 2;
      const cupTop = game.cupY - cupHeight / 2;
      const cupCatchTop = cupTop;
      const cupCatchBottom = cupTop + cupHeight * 0.5;

      for (let i = game.items.length - 1; i >= 0; i--) {
        const item = game.items[i];
        const itemImage = img[item.type];
        const itemHeight = imageHeightByWidth(itemImage, item.size);

        item.y += item.speed * dt;
        item.x += Math.sin(now * 0.002 + item.spin) * item.drift * dt;
        item.spin += dt * 5;

        const itemBottom = item.y + itemHeight / 2;
        const caught = itemBottom >= cupCatchTop && itemBottom <= cupCatchBottom && item.x > cupLeft + cupWidth * 0.12 && item.x < cupRight - cupWidth * 0.12;

        if (caught) {
          game.score += item.type === "bean" ? 2 : 1;
          game.items.splice(i, 1);
          updateHud();
          continue;
        }

        if (item.y > gameHeight + itemHeight) {
          game.items.splice(i, 1);
          game.lives -= 1;
          updateHud();
          if (game.lives <= 0) gameOver();
        }
      }
    }

    function drawItem(item) {
      ctx.save();
      ctx.translate(item.x, item.y);
      ctx.rotate(item.spin);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      const image = img[item.type];

      if (image.complete && image.naturalWidth > 0) {
        const width = item.size;
        const height = imageHeightByWidth(image, width);
        ctx.drawImage(image, -width / 2, -height / 2, width, height);
      } else if (item.type === "bean") {
        ctx.fillStyle = "#fff";
        ctx.fillRect(-18, -28, 36, 56);
        ctx.fillStyle = "#000";
        ctx.fillRect(-3, -22, 6, 44);
      } else {
        ctx.fillStyle = "#fff";
        ctx.fillRect(-25, -25, 50, 50);
        ctx.strokeStyle = "#000";
        ctx.strokeRect(-14, -14, 28, 28);
      }
      ctx.restore();
    }

    function drawCup() {
      const image = img.cup;
      const width = currentCupWidth();
      const height = imageHeightByWidth(image, width);
      const x = game.cupX;
      const y = game.cupY;

      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      if (image.complete && image.naturalWidth > 0) {
        ctx.drawImage(image, x - width / 2, y - height / 2, width, height);
      } else {
        ctx.fillStyle = "#fff";
        ctx.fillRect(x - 78, y - 38, 140, 78);
        ctx.fillRect(x - 94, y - 52, 170, 22);
        ctx.clearRect(x - 62, y - 22, 110, 47);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 8;
        ctx.strokeRect(x + 62, y - 17, 43, 39);
      }
      ctx.restore();
    }

    function loop(now) {
      drawBg(game.mode === "play" ? img.inBg : img.extBg, game.mode === "play" ? "IN" : "EXT", game.mode === "play" ? 0.62 : 0.34);
      if (game.mode === "play") {
        update(now);
        game.items.forEach(drawItem);
        drawCup();
      }
      requestAnimationFrame(loop);
    }

    function moveCup(x) {
      if (game.mode === "play") {
        const rect = container.getBoundingClientRect();
        game.cupX = x - rect.left;
      }
    }

    window.addEventListener("resize", resize);

    canvas.addEventListener("pointerdown", (event) => {
      if (game.mode !== "play") return;
      game.dragging = true;
      canvas.setPointerCapture(event.pointerId);
      moveCup(event.clientX);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (game.mode !== "play") return;
      if (game.dragging || event.pointerType === "mouse") moveCup(event.clientX);
    });

    canvas.addEventListener("pointerup", (event) => {
      game.dragging = false;
      if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointercancel", () => {
      game.dragging = false;
    });

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") game.keys.left = true;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") game.keys.right = true;
    });

    window.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") game.keys.left = false;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") game.keys.right = false;
    });

    document.addEventListener("touchstart", e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    resize();
    showHomeScreen();
    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
