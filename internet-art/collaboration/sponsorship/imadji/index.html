<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IMADJI - Kopi Es Data</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: "Courier New", monospace;
      user-select: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .screen, .hud {
      position: fixed;
      z-index: 2;
    }

    .screen {
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .screen[hidden], .hud[hidden] {
      display: none;
    }

    .panel {
      display: grid;
      justify-items: center;
      gap: 18px;
      width: min(780px, 100%);
      text-shadow: 2px 2px 0 #000;
    }

    .kicker, .signal {
      margin: 0;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .home-title-img {
      width: min(720px, 88vw);
      height: auto;
      display: block;
      image-rendering: auto;
    }

    p {
      max-width: 560px;
      margin: 0;
      font-size: clamp(15px, 2vw, 22px);
      line-height: 1.45;
    }

    button {
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .start-img-button {
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .start-img-button:hover {
      transform: scale(1.04);
      filter: invert(1);
    }

    .start-img-button img {
      width: min(220px, 44vw);
      height: auto;
      display: block;
      image-rendering: auto;
    }

    .hud {
      inset: 18px 18px auto 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .hud-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hud span {
      display: inline-block;
      padding: 6px 10px;
      color: #fff;
      background: #000;
      border: 2px solid #fff;
      font-size: clamp(14px, 2vw, 22px);
      text-shadow: 2px 2px 0 #000;
    }

    .mini-button {
      min-width: 76px;
      min-height: 38px;
      padding: 8px 12px;
      color: #fff;
      background: #000;
      border: 2px solid #fff;
      font-size: 15px;
      pointer-events: auto;
      box-shadow: 4px 4px 0 #fff;
      transition: transform 120ms ease, box-shadow 120ms ease, color 120ms ease, background 120ms ease;
    }

    .mini-button:hover {
      color: #000;
      background: #fff;
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #fff;
    }

    @media (max-width: 720px) {
      .screen {
        padding: 18px;
      }

      .kicker, .signal {
        font-size: 11px;
      }

      .home-title-img {
        width: min(520px, 92vw);
      }

      .start-img-button img {
        width: min(190px, 48vw);
      }

      .hud {
        inset: 12px 12px auto 12px;
      }

      .hud-group {
        max-width: calc(100vw - 94px);
        gap: 6px;
      }

      .hud span {
        padding: 4px 7px;
      }

      .mini-button {
        min-width: 62px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <main id="screen" class="screen">
    <section class="panel">
      <p class="kicker">IMADJI / INTERNET ART GAME</p>

      <img class="home-title-img" src="asset/home.webp" alt="Kopi Es Data">

      <p>Tangkap es batu dan biji kopi sebanyak mungkin. Cup mengikuti mouse, sentuhan, atau tombol kiri-kanan.</p>

      <button id="startBtn" class="start-img-button" type="button" aria-label="Start">
        <img src="asset/start.webp" alt="Start">
      </button>

      <p class="signal">1-BIT BREW PROTOCOL</p>
    </section>
  </main>

  <div id="hud" class="hud" hidden>
    <div class="hud-group">
      <span id="scoreText">SCORE 0</span>
      <span id="bestText">BEST 0</span>
      <span id="lifeText">LIFE 3</span>
    </div>

    <button id="exitBtn" class="mini-button" type="button">EXIT</button>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const screen = document.getElementById("screen");
    const hud = document.getElementById("hud");
    const startBtn = document.getElementById("startBtn");
    const exitBtn = document.getElementById("exitBtn");
    const scoreText = document.getElementById("scoreText");
    const bestText = document.getElementById("bestText");
    const lifeText = document.getElementById("lifeText");

    const asset = {
      extBg: "asset/imadji_yos_ext.webp",
      inBg: "asset/imadji_yos_in.webp",
      cup: "asset/cup.webp",
      ice: "asset/ice.webp",
      bean: "asset/bean.webp"
    };

    const img = {};

    Object.keys(asset).forEach((key) => {
      img[key] = new Image();
      img[key].src = asset[key];
    });

    const game = {
      mode: "start",
      score: 0,
      best: Number(localStorage.getItem("imadjiCoffeeBest") || 0),
      lives: 3,

      cupX: 0,
      cupY: 0,
      cupW: 250,

      beanSize: 92,
      iceSize: 86,

      items: [],
      lastSpawn: 0,
      lastTime: 0,
      spawnRate: 780,
      glitch: 0,

      keys: {
        left: false,
        right: false
      }
    };

    function resize() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + "px";
      canvas.style.height = innerHeight + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      game.cupX ||= innerWidth / 2;
      game.cupY = innerHeight - Math.max(104, innerHeight * 0.13);
    }

    function imageHeightByWidth(image, width) {
      if (!image || !image.naturalWidth || !image.naturalHeight) return width;
      return width / (image.naturalWidth / image.naturalHeight);
    }

    function updateHud() {
      scoreText.textContent = "SCORE " + game.score;
      bestText.textContent = "BEST " + game.best;
      lifeText.textContent = "LIFE " + game.lives;
    }

    function startGame() {
      game.mode = "play";
      game.score = 0;
      game.lives = 3;
      game.items = [];
      game.spawnRate = 780;
      game.lastSpawn = performance.now();
      game.lastTime = performance.now();
      game.cupX = innerWidth / 2;
      game.glitch = 12;

      screen.hidden = true;
      hud.hidden = false;

      updateHud();
    }

    function showStart() {
      game.mode = "start";
      game.items = [];
      hud.hidden = true;
      screen.hidden = false;

      screen.innerHTML = `
        <section class="panel">
          <p class="kicker">IMADJI / INTERNET ART GAME</p>

          <img class="home-title-img" src="asset/home.webp" alt="Kopi Es Data">

          <p>Tangkap es batu dan biji kopi sebanyak mungkin. Cup mengikuti mouse, sentuhan, atau tombol kiri-kanan.</p>

          <button id="newStartBtn" class="start-img-button" type="button" aria-label="Start">
            <img src="asset/start.webp" alt="Start">
          </button>

          <p class="signal">1-BIT BREW PROTOCOL</p>
        </section>
      `;

      document.getElementById("newStartBtn").onclick = startGame;
    }

    function gameOver() {
      game.mode = "over";
      hud.hidden = true;
      screen.hidden = false;

      screen.innerHTML = `
        <section class="panel">
          <p class="kicker">SIGNAL LOST</p>
          <img class="home-title-img" src="asset/home.webp" alt="Kopi Es Data">
          <p>SCORE ${game.score} / BEST ${game.best}</p>
          <button id="restartBtn" class="start-img-button" type="button" aria-label="Restart">
            <img src="asset/start.webp" alt="Restart">
          </button>
        </section>
      `;

      document.getElementById("restartBtn").onclick = startGame;
    }

    function drawBg(image, label, darken = 0.34) {
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      if (image.complete && image.naturalWidth > 0) {
        const scale = Math.max(innerWidth / image.naturalWidth, innerHeight / image.naturalHeight);
        const w = image.naturalWidth * scale;
        const h = image.naturalHeight * scale;

        ctx.drawImage(image, (innerWidth - w) / 2, (innerHeight - h) / 2, w, h);
      } else {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, innerWidth, innerHeight);

        ctx.fillStyle = "#fff";
        ctx.font = "12px monospace";

        for (let y = 14; y < innerHeight; y += 26) {
          for (let x = y % 52; x < innerWidth; x += 52) {
            ctx.fillText(label, x, y);
          }
        }
      }

      ctx.fillStyle = `rgba(0,0,0,${darken})`;
      ctx.fillRect(0, 0, innerWidth, innerHeight);

      ctx.strokeStyle = "rgba(255,255,255,0.18)";

      for (let y = 0; y < innerHeight; y += 6) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(innerWidth, y);
        ctx.stroke();
      }

      ctx.restore();
    }

    function spawn(now) {
      if (now - game.lastSpawn < game.spawnRate) return;

      game.lastSpawn = now;
      game.spawnRate = Math.max(330, 780 - game.score * 7);

      const type = Math.random() > 0.58 ? "bean" : "ice";
      const size = type === "bean" ? game.beanSize : game.iceSize;

      game.items.push({
        type,
        x: 40 + Math.random() * Math.max(1, innerWidth - 80),
        y: -size,
        size,
        speed: 145 + Math.random() * 120 + game.score * 1.3,
        drift: (Math.random() - 0.5) * 46,
        spin: Math.random() * Math.PI
      });
    }

    function update(now) {
      const dt = Math.min(0.034, (now - game.lastTime) / 1000 || 0.016);

      game.lastTime = now;

      if (game.keys.left) game.cupX -= 540 * dt;
      if (game.keys.right) game.cupX += 540 * dt;

      const cupHeight = imageHeightByWidth(img.cup, game.cupW);
      const cupLeftLimit = game.cupW / 2;
      const cupRightLimit = innerWidth - game.cupW / 2;

      game.cupX = Math.max(cupLeftLimit, Math.min(cupRightLimit, game.cupX));
      game.cupY = innerHeight - Math.max(cupHeight * 0.55, innerHeight * 0.13);

      spawn(now);

      const cupLeft = game.cupX - game.cupW / 2;
      const cupRight = game.cupX + game.cupW / 2;
      const cupTop = game.cupY - cupHeight / 2;

      for (let i = game.items.length - 1; i >= 0; i--) {
        const item = game.items[i];

        const itemImage = img[item.type];
        const itemHeight = imageHeightByWidth(itemImage, item.size);

        item.y += item.speed * dt;
        item.x += Math.sin(now * 0.002 + item.spin) * item.drift * dt;
        item.spin += dt * 5;

        const caught =
          item.y + itemHeight / 2 > cupTop &&
          item.y < game.cupY + cupHeight * 0.38 &&
          item.x > cupLeft &&
          item.x < cupRight;

        if (caught) {
          game.score += item.type === "bean" ? 2 : 1;
          game.best = Math.max(game.best, game.score);

          localStorage.setItem("imadjiCoffeeBest", String(game.best));

          game.items.splice(i, 1);
          game.glitch = 2;

          updateHud();
          continue;
        }

        if (item.y > innerHeight + itemHeight) {
          game.items.splice(i, 1);
          game.lives -= 1;
          game.glitch = 8;

          updateHud();

          if (game.lives <= 0) gameOver();
        }
      }
    }

    function drawItem(item) {
      ctx.save();
      ctx.translate(item.x, item.y);
      ctx.rotate(item.spin);

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      const image = img[item.type];

      if (image.complete && image.naturalWidth > 0) {
        const width = item.size;
        const height = imageHeightByWidth(image, width);

        ctx.drawImage(image, -width / 2, -height / 2, width, height);
      } else if (item.type === "bean") {
        ctx.fillStyle = "#fff";
        ctx.fillRect(-18, -28, 36, 56);
        ctx.fillStyle = "#000";
        ctx.fillRect(-3, -22, 6, 44);
      } else {
        ctx.fillStyle = "#fff";
        ctx.fillRect(-25, -25, 50, 50);
        ctx.strokeStyle = "#000";
        ctx.strokeRect(-14, -14, 28, 28);
      }

      ctx.restore();
    }

    function drawCup() {
      const x = game.cupX;
      const y = game.cupY;
      const image = img.cup;

      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      if (image.complete && image.naturalWidth > 0) {
        const width = game.cupW;
        const height = imageHeightByWidth(image, width);

        ctx.drawImage(image, x - width / 2, y - height / 2, width, height);
      } else {
        ctx.fillStyle = "#fff";
        ctx.fillRect(x - 78, y - 38, 140, 78);
        ctx.fillRect(x - 94, y - 52, 170, 22);
        ctx.clearRect(x - 62, y - 22, 110, 47);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 8;
        ctx.strokeRect(x + 62, y - 17, 43, 39);
      }

      ctx.restore();
    }

    function drawGlitch() {
      if (game.glitch <= 0) return;

      for (let i = 0; i < 60; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? "#fff" : "#000";
        ctx.fillRect(
          Math.random() * innerWidth,
          Math.random() * innerHeight,
          Math.random() * 180,
          Math.random() * 24
        );
      }

      game.glitch -= 1;
    }

    function loop(now) {
      drawBg(
        game.mode === "play" ? img.inBg : img.extBg,
        game.mode === "play" ? "IN" : "EXT",
        game.mode === "play" ? 0.62 : 0.34
      );

      if (game.mode === "play") {
        update(now);
        game.items.forEach(drawItem);
        drawCup();
      }

      drawGlitch();
      requestAnimationFrame(loop);
    }

    function moveCup(x) {
      if (game.mode === "play") game.cupX = x;
    }

    window.addEventListener("resize", resize);

    window.addEventListener("pointermove", e => moveCup(e.clientX), { passive: true });
    window.addEventListener("pointerdown", e => moveCup(e.clientX), { passive: true });

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") game.keys.left = true;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") game.keys.right = true;
    });

    window.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") game.keys.left = false;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") game.keys.right = false;
    });

    document.addEventListener("touchstart", e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    startBtn.onclick = startGame;
    exitBtn.onclick = showStart;

    resize();
    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
