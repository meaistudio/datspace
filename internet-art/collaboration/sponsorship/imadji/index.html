<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IMADJI - CUP COLLECTOR</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: monospace;
      user-select: none;
      touch-action: none;
    }

    input, button {
      font-family: monospace;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    .screen,
    .hud,
    .logo-row,
    .visit-fixed {
      position: fixed;
      z-index: 2;
    }

    .screen {
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .screen[hidden],
    .hud[hidden],
    .visit-fixed[hidden],
    .logo-row[hidden] {
      display: none;
    }

    .panel {
      display: grid;
      justify-items: center;
      gap: 18px;
      width: min(820px, 100%);
      text-shadow: 2px 2px 0 #000;
    }

    .logo-row {
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }

    .logo-row img {
      height: clamp(148px, 16vw, 182px);
      width: auto;
      display: block;
    }

    .logo-x {
      font-size: 100px;
      line-height: 1;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
    }

    .visit-fixed {
      left: 50%;
      bottom: 200px;
      transform: translateX(-50%);
      z-index: 5;
      font-size: clamp(30px, 4vw, 48px);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: auto;
    }

    .visit-fixed a {
      display: inline-block;
      padding: 8px 12px;
      color: #fff;
      background: #000;
      border: 2px solid #fff;
      text-decoration: none;
      transition: color 120ms ease, background 120ms ease;
      touch-action: manipulation;
    }

    .visit-fixed a:hover {
      color: #000;
      background: #fff;
    }

    .kicker {
      margin: 0;
      font-size: clamp(22px, 2.8vw, 28px);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .home-title-img {
      width: min(720px, 88vw);
      height: auto;
      display: block;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    @keyframes blinkStart {
      0%, 45% { opacity: 1; filter: none; }
      46%, 55% { opacity: 0.2; filter: invert(1); }
      56%, 100% { opacity: 1; filter: none; }
    }

    .start-img-button {
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      margin-top: 18px;
      transition: transform 140ms ease;
    }

    .start-img-button:hover {
      transform: scale(1.04);
    }

    .start-img-button img {
      width: min(220px, 44vw);
      height: auto;
      display: block;
      animation: blinkStart 1.1s steps(1) infinite;
    }

    .hud {
      inset: 18px 18px auto 18px;
      display: flex;
      justify-content: flex-start;
      pointer-events: none;
      z-index: 3;
    }

    .hud-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }

    .hud-item,
    .score-pill {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      padding: 6px 12px;
      background: #000;
      border: 2px solid #fff;
    }

    .hud-label-img,
    .score-pill-label {
      height: clamp(18px, 2.2vw, 28px);
      width: auto;
      display: block;
    }

    .number-img-row {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 10px;
      min-height: clamp(18px, 2.2vw, 28px);
    }

    .number-img-row img {
      height: clamp(18px, 2.2vw, 28px);
      width: auto;
      display: block;
    }

    .number-fallback {
      color: #fff;
      font-size: clamp(14px, 2vw, 22px);
      line-height: 1;
    }

    .top-score-title {
      width: min(360px, 74vw);
      height: auto;
      display: block;
    }

    .score-summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .top-score-list {
      display: grid;
      gap: 6px;
      width: min(420px, 86vw);
    }

    .top-score-row {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 7px 10px;
      background: #000;
      border: 2px solid #fff;
      font-size: clamp(14px, 2vw, 20px);
      text-align: left;
    }

    .top-score-row span:first-child {
      opacity: 0.7;
    }

    .top-score-row .number-img-row {
      justify-content: flex-end;
      margin-left: 0;
    }

    .submit-score {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .submit-score input {
      width: min(280px, 76vw);
      padding: 10px;
      color: #fff;
      background: #000;
      border: 2px solid #fff;
      font: inherit;
      text-align: center;
      text-transform: uppercase;
      box-sizing: border-box;
    }

    .submit-score input::placeholder {
      color: rgba(255, 255, 255, 0.68);
    }

    @media (max-width: 1024px) {
      .logo-row {
        top: 12px;
        gap: 8px;
      }

      .logo-row img {
        height: 24px;
      }

      .logo-x {
        font-size: 18px;
      }

      .visit-fixed {
        bottom: 12px;
        font-size: 11px;
      }

      .home-title-img {
        width: min(520px, 92vw);
      }

      .start-img-button img {
        width: min(170px, 42vw);
      }

      .hud {
        inset: 50px 10px auto 10px;
      }

      .hud-group {
        gap: 5px;
      }

      .hud-item {
        gap: 5px;
        padding: 3px 5px;
        border-width: 1px;
      }

      .hud-label-img,
      .score-pill-label {
        height: 13px;
      }

      .number-img-row {
        gap: 1px;
        margin-left: 2px;
        min-height: 13px;
      }

      .number-img-row img {
        height: 13px;
      }

      .number-fallback {
        font-size: 12px;
      }

      .top-score-row {
        grid-template-columns: 30px 1fr auto;
      }
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div class="logo-row">
    <img src="asset/imadji.webp" alt="Imadji">
    <span class="logo-x">X</span>
    <img src="asset/dats.webp" alt="DATs">
  </div>

  <div id="visitLink" class="visit-fixed">
    <a href="https://datspace.club" target="_blank" rel="noopener noreferrer">KUNJUNGI datspace.club</a>
  </div>

  <main id="screen" class="screen">
    <section class="panel">
      <p class="kicker">INTERACTIVE GAME BY DATs</p>

      <img class="home-title-img" src="asset/home.webp" alt="Kopi Es Data">

      <button id="startBtn" class="start-img-button" type="button" aria-label="Start">
        <img src="asset/start.webp" alt="Start">
      </button>
    </section>
  </main>

  <div id="hud" class="hud" hidden>
    <div class="hud-group">
      <div class="hud-item">
        <img class="hud-label-img" src="asset/score.webp" alt="Score">
        <span id="scoreText" class="number-img-row"></span>
      </div>

      <div class="hud-item">
        <img class="hud-label-img" src="asset/best.webp" alt="Best">
        <span id="bestText" class="number-img-row"></span>
      </div>

      <div class="hud-item">
        <img class="hud-label-img" src="asset/life.webp" alt="Life">
        <span id="lifeText" class="number-img-row"></span>
      </div>
    </div>
  </div>

  <script>
    const SHEET_ENDPOINT = "";
    const TOP_SCORE_KEY = "imadjiTopScores";

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const screen = document.getElementById("screen");
    const hud = document.getElementById("hud");
    const visitLink = document.getElementById("visitLink");
    const logoRow = document.querySelector(".logo-row");
    const startBtn = document.getElementById("startBtn");
    const scoreText = document.getElementById("scoreText");
    const bestText = document.getElementById("bestText");
    const lifeText = document.getElementById("lifeText");

    const asset = {
      extBg: "asset/imadji_yos_ext.webp",
      inBg: "asset/imadji_yos_in.webp",
      cup: "asset/cup.webp",
      ice: "asset/ice.webp",
      bean: "asset/bean.webp"
    };

    const img = {};
    Object.keys(asset).forEach((key) => {
      img[key] = new Image();
      img[key].src = asset[key];
    });

    const digitImg = {};
    for (let i = 0; i <= 9; i++) {
      digitImg[i] = new Image();
      digitImg[i].src = `asset/${i}.webp`;
    }

    const game = {
      mode: "start",
      score: 0,
      best: Number(localStorage.getItem("imadjiCoffeeBest") || 0),
      bestBeforeRun: 0,
      lives: 3,

      cupX: 0,
      cupY: 0,
      cupW: 250,

      beanSize: 92,
      iceSize: 86,

      items: [],
      lastSpawn: 0,
      lastTime: 0,
      spawnRate: 780,

      dragging: false,

      keys: {
        left: false,
        right: false
      }
    };

    function isCompactScreen() {
      return window.innerWidth <= 1024;
    }

    function currentCupWidth() {
      return isCompactScreen() ? game.cupW * 0.5 : game.cupW;
    }

    function currentBeanSize() {
      return isCompactScreen() ? game.beanSize * 0.5 : game.beanSize;
    }

    function currentIceSize() {
      return isCompactScreen() ? game.iceSize * 0.5 : game.iceSize;
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + "px";
      canvas.style.height = innerHeight + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      game.cupX ||= innerWidth / 2;
      game.cupY = innerHeight - Math.max(104, innerHeight * 0.13);
    }

    function imageHeightByWidth(image, width) {
      if (!image || !image.naturalWidth || !image.naturalHeight) return width;
      return width / (image.naturalWidth / image.naturalHeight);
    }

    function getTopScores() {
      return JSON.parse(localStorage.getItem(TOP_SCORE_KEY) || "[]");
    }

    function saveTopScore(entry) {
      const scores = getTopScores();
      scores.push(entry);
      scores.sort((a, b) => b.score - a.score);
      localStorage.setItem(TOP_SCORE_KEY, JSON.stringify(scores.slice(0, 10)));
    }

    async function submitToSheet(entry) {
      if (!SHEET_ENDPOINT) return;

      await fetch(SHEET_ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          initials: entry.initials,
          instagram: entry.instagram,
          score: entry.score
        })
      });
    }

    function renderNumber(target, value) {
      const text = String(Math.max(0, value));
      target.innerHTML = "";

      for (const digit of text) {
        const image = digitImg[digit];

        if (image && image.complete && image.naturalWidth > 0) {
          const numberImage = document.createElement("img");
          numberImage.src = `asset/${digit}.webp`;
          numberImage.alt = digit;
          target.appendChild(numberImage);
        } else {
          const fallback = document.createElement("span");
          fallback.className = "number-fallback";
          fallback.textContent = digit;
          target.appendChild(fallback);
        }
      }
    }

    function numberMarkup(value) {
      const text = String(Math.max(0, value));

      return `
        <span class="number-img-row">
          ${text.split("").map((digit) => `
            <img src="asset/${digit}.webp" alt="${digit}" onerror="this.outerHTML='<span class=&quot;number-fallback&quot;>${digit}</span>'">
          `).join("")}
        </span>
      `;
    }

    function updateHud() {
      renderNumber(scoreText, game.score);
      renderNumber(bestText, game.best);
      renderNumber(lifeText, game.lives);
    }

    function renderTopScores() {
      const scores = getTopScores();

      if (!scores.length) {
        return `<p>NO TOP SCORE</p>`;
      }

      return `
        <div class="top-score-list">
          ${scores.map((item, index) => `
            <div class="top-score-row">
              <span>${index + 1}</span>
              <span>${item.initials}</span>
              ${numberMarkup(item.score)}
            </div>
          `).join("")}
        </div>
      `;
    }

    function startGame() {
      game.mode = "play";
      game.score = 0;
      game.lives = 3;
      game.items = [];
      game.spawnRate = 780;
      game.lastSpawn = performance.now();
      game.lastTime = performance.now();
      game.bestBeforeRun = game.best;
      game.cupX = innerWidth / 2;

      screen.hidden = true;
      hud.hidden = false;
      visitLink.hidden = true;
      logoRow.hidden = true;

      updateHud();
    }

    function showStart() {
      game.mode = "start";
      game.items = [];
      hud.hidden = true;
      screen.hidden = false;
      visitLink.hidden = false;
      logoRow.hidden = false;

      screen.innerHTML = `
        <section class="panel">
          <p class="kicker">INTERACTIVE GAME BY DATs</p>

          <img class="home-title-img" src="asset/home.webp" alt="Kopi Es Data">

          <button id="newStartBtn" class="start-img-button" type="button" aria-label="Start">
            <img src="asset/start.webp" alt="Start">
          </button>
        </section>
      `;

      document.getElementById("newStartBtn").onclick = startGame;
    }

    function gameOver() {
      game.mode = "over";
      hud.hidden = true;
      screen.hidden = false;
      visitLink.hidden = false;
      logoRow.hidden = false;

      const isNewBest = game.score > game.bestBeforeRun;

      if (!isNewBest) {
        game.best = Math.max(game.best, game.score);
        localStorage.setItem("imadjiCoffeeBest", String(game.best));
      }

      screen.innerHTML = `
        <section class="panel">
          <div class="score-summary">
            <div class="score-pill">
              <img class="score-pill-label" src="asset/score.webp" alt="Score">
              ${numberMarkup(game.score)}
            </div>

            <div class="score-pill">
              <img class="score-pill-label" src="asset/best.webp" alt="Best">
              ${numberMarkup(Math.max(game.best, game.score))}
            </div>
          </div>

          <img class="top-score-title" src="asset/top_score.webp" alt="Top Score">

          ${renderTopScores()}

          ${isNewBest ? `
            <form id="scoreForm" class="submit-score">
              <input id="initialInput" maxlength="5" placeholder="INISIAL" required>
              <input id="igInput" maxlength="40" placeholder="INSTAGRAM" required>

              <button class="start-img-button" type="submit" aria-label="Submit">
                <img src="asset/start.webp" alt="Submit">
              </button>
            </form>
          ` : `
            <button id="restartBtn" class="start-img-button" type="button" aria-label="Restart">
              <img src="asset/start.webp" alt="Restart">
            </button>
          `}
        </section>
      `;

      if (isNewBest) {
        document.getElementById("scoreForm").onsubmit = async (event) => {
          event.preventDefault();

          const entry = {
            initials: document.getElementById("initialInput").value.slice(0, 5).toUpperCase(),
            instagram: document.getElementById("igInput").value.trim(),
            score: game.score
          };

          game.best = Math.max(game.best, game.score);
          localStorage.setItem("imadjiCoffeeBest", String(game.best));

          saveTopScore(entry);
          await submitToSheet(entry);

          gameOver();
        };
      } else {
        document.getElementById("restartBtn").onclick = startGame;
      }
    }

    function drawBg(image, label, darken = 0.34) {
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      if (image.complete && image.naturalWidth > 0) {
        const scale = Math.max(innerWidth / image.naturalWidth, innerHeight / image.naturalHeight);
        const w = image.naturalWidth * scale;
        const h = image.naturalHeight * scale;

        ctx.drawImage(image, (innerWidth - w) / 2, (innerHeight - h) / 2, w, h);
      } else {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, innerWidth, innerHeight);

        ctx.fillStyle = "#fff";
        ctx.font = "12px monospace";

        for (let y = 14; y < innerHeight; y += 26) {
          for (let x = y % 52; x < innerWidth; x += 52) {
            ctx.fillText(label, x, y);
          }
        }
      }

      ctx.fillStyle = `rgba(0,0,0,${darken})`;
      ctx.fillRect(0, 0, innerWidth, innerHeight);

      ctx.strokeStyle = "rgba(255,255,255,0.18)";

      for (let y = 0; y < innerHeight; y += 6) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(innerWidth, y);
        ctx.stroke();
      }

      ctx.restore();
    }

    function spawn(now) {
      if (now - game.lastSpawn < game.spawnRate) return;

      game.lastSpawn = now;
      game.spawnRate = Math.max(330, 780 - game.score * 7);

      const type = Math.random() > 0.58 ? "bean" : "ice";
      const size = type === "bean" ? currentBeanSize() : currentIceSize();

      game.items.push({
        type,
        x: 40 + Math.random() * Math.max(1, innerWidth - 80),
        y: -size,
        size,
        speed: 145 + Math.random() * 120 + game.score * 1.3,
        drift: (Math.random() - 0.5) * 46,
        spin: Math.random() * Math.PI
      });
    }

    function update(now) {
      const dt = Math.min(0.034, (now - game.lastTime) / 1000 || 0.016);

      game.lastTime = now;

      const cupWidth = currentCupWidth();
      const cupHeight = imageHeightByWidth(img.cup, cupWidth);

      if (game.keys.left) game.cupX -= 540 * dt;
      if (game.keys.right) game.cupX += 540 * dt;

      game.cupX = Math.max(cupWidth / 2, Math.min(innerWidth - cupWidth / 2, game.cupX));
      game.cupY = innerHeight - Math.max(cupHeight * 0.55, innerHeight * 0.13);

      spawn(now);

      const cupLeft = game.cupX - cupWidth / 2;
      const cupRight = game.cupX + cupWidth / 2;
      const cupTop = game.cupY - cupHeight / 2;
      const cupCatchTop = cupTop;
      const cupCatchBottom = cupTop + cupHeight * 0.5;

      for (let i = game.items.length - 1; i >= 0; i--) {
        const item = game.items[i];

        const itemImage = img[item.type];
        const itemHeight = imageHeightByWidth(itemImage, item.size);

        item.y += item.speed * dt;
        item.x += Math.sin(now * 0.002 + item.spin) * item.drift * dt;
        item.spin += dt * 5;

        const itemBottom = item.y + itemHeight / 2;

        const caught =
          itemBottom >= cupCatchTop &&
          itemBottom <= cupCatchBottom &&
          item.x > cupLeft + cupWidth * 0.12 &&
          item.x < cupRight - cupWidth * 0.12;

        if (caught) {
          game.score += item.type === "bean" ? 2 : 1;
          game.items.splice(i, 1);
          updateHud();
          continue;
        }

        if (item.y > innerHeight + itemHeight) {
          game.items.splice(i, 1);
          game.lives -= 1;
          updateHud();

          if (game.lives <= 0) gameOver();
        }
      }
    }

    function drawItem(item) {
      ctx.save();
      ctx.translate(item.x, item.y);
      ctx.rotate(item.spin);

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      const image = img[item.type];

      if (image.complete && image.naturalWidth > 0) {
        const width = item.size;
        const height = imageHeightByWidth(image, width);

        ctx.drawImage(image, -width / 2, -height / 2, width, height);
      } else if (item.type === "bean") {
        ctx.fillStyle = "#fff";
        ctx.fillRect(-18, -28, 36, 56);
        ctx.fillStyle = "#000";
        ctx.fillRect(-3, -22, 6, 44);
      } else {
        ctx.fillStyle = "#fff";
        ctx.fillRect(-25, -25, 50, 50);
        ctx.strokeStyle = "#000";
        ctx.strokeRect(-14, -14, 28, 28);
      }

      ctx.restore();
    }

    function drawCup() {
      const image = img.cup;
      const width = currentCupWidth();
      const height = imageHeightByWidth(image, width);
      const x = game.cupX;
      const y = game.cupY;

      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      if (image.complete && image.naturalWidth > 0) {
        ctx.drawImage(image, x - width / 2, y - height / 2, width, height);
      } else {
        ctx.fillStyle = "#fff";
        ctx.fillRect(x - 78, y - 38, 140, 78);
        ctx.fillRect(x - 94, y - 52, 170, 22);
        ctx.clearRect(x - 62, y - 22, 110, 47);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 8;
        ctx.strokeRect(x + 62, y - 17, 43, 39);
      }

      ctx.restore();
    }

    function loop(now) {
      drawBg(
        game.mode === "play" ? img.inBg : img.extBg,
        game.mode === "play" ? "IN" : "EXT",
        game.mode === "play" ? 0.62 : 0.34
      );

      if (game.mode === "play") {
        update(now);
        game.items.forEach(drawItem);
        drawCup();
      }

      requestAnimationFrame(loop);
    }

    function moveCup(x) {
      if (game.mode === "play") game.cupX = x;
    }

    window.addEventListener("resize", resize);

    canvas.addEventListener("pointerdown", (event) => {
      if (game.mode !== "play") return;
      game.dragging = true;
      canvas.setPointerCapture(event.pointerId);
      moveCup(event.clientX);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (game.mode !== "play") return;
      if (game.dragging || event.pointerType === "mouse") moveCup(event.clientX);
    });

    canvas.addEventListener("pointerup", (event) => {
      game.dragging = false;
      if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointercancel", () => {
      game.dragging = false;
    });

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") game.keys.left = true;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") game.keys.right = true;
    });

    window.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") game.keys.left = false;
      if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") game.keys.right = false;
    });

    document.addEventListener("touchstart", e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    startBtn.onclick = startGame;

    resize();
    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
