<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>DATs_Out2 TU'TUR'ANG'RING'</title>

<style>
:root{
    --sceneScale:1;

    /* ATUR POSISI CURSOR HP */
    --mobileCursorOffsetX:0px;
    --mobileCursorOffsetY:-14px;
}

html,body{
    margin:0;width:100%;height:100%;overflow:hidden;background:black;
    cursor:none;touch-action:none;overscroll-behavior:none;user-select:none;
    position:fixed;inset:0;
    font-family: sans-serif;
}

.scene{
    position:fixed;top:50%;left:50%;width:700px;
    transform:translate(-50%,-50%) scale(var(--sceneScale));
    transform-origin:center center;
    display:flex;align-items:center;justify-content:center;
    flex-direction: column;
}

.bg1{
    position:absolute;width:95%;opacity:.5;z-index:1;pointer-events:none;
}

/* KOTAK LINK KUSTOM */
.link-container {
    position: relative;
    z-index: 10; /* Supaya berada di atas video dan bisa diklik */
    display: flex;
    gap: 15px;
    margin-top: 20px; /* Jarak dari video jika scene menggunakan flex */
}

.custom-box {
    display: inline-block;
    padding: 10px 20px;
    border: 2px solid #fff;
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(0, 0, 0, 0.6);
    transition: all 0.3s ease;
    font-size: 14px;
}

.custom-box:hover {
    background: #fff;
    color: #000;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="scene">
    <!-- Mengubah img menjadi video agar .mp4 bisa berputar otomatis dan looping -->
    <video class="bg1" autoplay loop muted playsinline>
        <source src="discotit/DISCOTIT post.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Kontainer Link Kustom -->
    <div class="link-container">
        <!-- Ganti 'USERNAME_IG' dengan username Instagram Anda yang asli -->
        <a href="https://instagram.com/discotit_" target="_blank" class="custom-box">Instagram</a>
        <a href="https://datspace.club/internet-art/event/dats_out/dats_out2/" class="custom-box">Back to Datspace</a>
    </div>
</div>

</body>
</html>
